body:
  text: 傳信適用方卷下治癰疽瘡癤張元輔方一宗陸道地黃圓常服令人終身不患發背熟乾地黃伍兩蓯蓉酒浸天門冬石斛當歸防風白茯苓川芎各叁兩逺志黃蓍甘草炙芍藥各二兩人參細辛巴㦸各一兩右為細末煉蜜圓如梧桐子大每服叄拾圓荆芥湯下萬靈圓治發背腫痛裏托定疼羌活薄荷葉各叁兩川芎𤣥參地榆麻黃去節防風天麻吳白芷白彊蠶牛旁子炒蔓荆子旋覆花荆芥穗各二兩甘菊叁兩何首烏肆兩大川烏生肆兩甘草肆兩半炙蟬退去足半兩右細末煉蜜為圓彈子大細嚼一彈茶酒送下沒藥圓治發背活經絡生肌肉大川烏生當歸赤芍藥蘇木銼炒木鱉仁五靈脂炒羌活獨活穿山甲蛤粉炒脆各二兩沒藥乳香别研各一兩右細末酒煮麵糊為圓如梧桐子大溫酒下叄拾圎凉血護肌膏南星生末捌兩雄黃一兩别研白礬生末肆兩右細勻用生地黃汁調塗四圍萬靈膏用淨鐺一隻下清油捌兩婦人油髮一兩炭火熬令焦盡下側柏枝一兩歷青一兩卷柏一兩太平白芷一兩當歸一兩木鱉肉切片一兩松枝香一兩熬令紫用楊栁枝不住手攪焦即銼頭熬前藥紫色以綿兩重濾去滓再熬油滚下白膠香一兩次下沒藥一兩次下乳香一兩並逐旋半錢徐下次下黃丹一兩剪刀草末一兩慢火熬為膏滴成珠子就也用新汲井水浸去火毒先以葱鹽湯洗瘡次用軟帛火炙攤上不得留孔貼之剪刀草乃田中野茨菰也羚羊角散內消發背穿山甲肆兩蛤粉炒脆甘草炙當歸各二兩右為細末炮甘草根浸酒調下二錢瓜蔞散內消惡肉生好肉黃蓍肆兩銼皂角刺捌兩紅者拍碎銼甘草陸兩牛膝二兩黃瓜蔞拾箇銼右用蜜一斤旋入鐺內炒至紫色見風吹脆為末有滓再炒為末酒調下二錢右方七道里人張元輔用之如神由此致富然祕藏此方人莫傳者余少時目擊其事後凡叄拾年始得之於章明叔蓋其徒云拙庵老人題李溫如方一宗六道李溫如八行家寶祕療發背藥方不以傳人其子秉彛客於新吳大姓羅氏一日出謁偶忘封鎖書篋為諸生竊取其方録之秉彛歸為之出涕蓋其父子以此方救人之死甚多深不欲傳也其用藥次第如後初覺閻發時先服通關散門氏載此藥治發背內潰及諸惡毒衝心嘔逆見信效方菉豆末二錢乳香末一錢右二味和勻井花水調服微利為妙次用藥試發瘡可治不可治白礬一兩天南星一箇右為末以冷水和勻傅腫處留出瘡口仍以筆畫泥瘡暈若藥力勝則腫消皮皺此為易治若腫處皮急暈開即難治次服赤小豆右用赤小豆半升不去皮生為末每用一兩匙以冷水調下連併服盡如未退再服半升取口鼻大便出血為度服豆末時不可喫飯次服四味散石上薜荔二兩地榆一兩甘草節一兩當歸一兩右為末溫酒調下叄錢次服膨脝葉叄斤岡穀刺葉一斤右二味旋採勿令婦人雞犬見碓臼內春爛每用一碗許以酒一盞浸去滓溫服仍以藥滓􅛇瘡次用斂瘡口生肌散木香檳榔黃連洗去鬚右叄味等分淨器碾羅為末時以傅瘡若瘡潰爛傅了更以常用膏藥或雲母膏貼定聽膿水自出若用此藥傅後瘡口未便斂白及末輕粉各少許勻傅即有速效門資欽録元立方一宗四道壽州霍丘醫瘡人元立治瘡甚有聲元符己卯豫侍先子將漕江東舟次壽州豫因纍日食雞卵數十枚暴得咽喉腫塞及頸赤腫硬下連心胸如鐵石日夕號呌喉中水米不通壅塞將死召醫者視之云此喉癰也泛泛藥恐無益因言可招元立治之必愈先子夜遣介兩日往還數百里召立至用藥數服得效報之頗厚立感激豫自傳治發背方四首皆纍用有竒功今録于下治發背腦疽一切惡瘡當先用托裏藥使毒氣皆出一醉膏凡初覺發背癰疽等即多服用大黃甘草等藥極踈轉以行道毒氣次用此藥大甘草半兩為粗末沒藥一分研苽蔞一箇大者去皮右叄物用無灰酒叄升熬至一升放溫頓服之如一服不盡分叄兩服連服盡次用收暈白玉膏切忌用冷藥外貼必逼毒氣入內殺人杏仁二拾一粒去皮尖研川椒肆拾玖粒去目為末清脂麻油一兩酒臘半兩白者右同熬至紫黑新綿濾過用無灰薄紙看瘡大小剪作梳樣攤藥在上於瘡暈盡處向兩邊圍繞貼之候暈漸收近裏即别剪差小者再攤藥圍貼暈又收即又再移近裏貼仍頻換候暈已收見瘡根腳或瘡口即用次方專貼大惡瘡毒氣方盛不可以藥當上貼恐趕散毒氣瘡益大此藥能收暈見瘡其法大妙暈收見瘡次用檳榔散雞心檳榔半兩川黃連去鬚半兩川山甲大者拾片燒灰存性右同為細末先用好臘茶清掃過瘡用藥厚傅瘡上日叄伍次以膿出為知如見瘡口後用此藥數次了可更用乳香膏膿已出用生肌藥黃狗腦蓋骨二兩燒灰存性此極難得須預收膩粉一錢桑白皮末一兩右同為細末用生油調塗瘡上以上四方是一宗元立自云少年時初得此方救十餘人後忽自病背瘡自信其藥乃以此四藥自治得愈袒背示豫瘢㾗猶盈尺也豫在汝州時梁縣吏人侯昱孝母病背瘡豫用此治之愈泰山石刻一宗七道專治發背方神妙不可具言右初覺或做瘡用牛皮膠熬令稀稠得所如藥花攤在毛頭紙上於初覺處或有做瘡處貼次用軟布帕子二條於釅米醋內煮令熱漉出互相於膠紙上乘熱蒸尉不可令布帕冷布帕二條不可都齊漉出常留一條在醋內煮候蒸尉得一條冷却於醋內取熱布蒸尉冷布却入效醋內煮庶幾常得熱布替換尉蒸即易見若瘡癢時乃是藥攻其病須忍癢不住蒸尉直候膿出將盡即濃煎貫衆湯候溫洗去膠紙次日後看瘡中尚有膿出即是未效却再如前將膠紙鋪於瘡上用熱醋布依舊蒸尉追令膿盡然後却用貫衆煎湯如前洗去膠紙次日後依前更看若尚有膿又如前法蒸尉雖連數日蒸尉不妨但要瘡中膿盡瘡成乾掩為度然後用生肌紅玉散摻在瘡上即以萬金膏貼每日一上或兩上專治諸般惡瘡萬金膏黃連黃柏黃芩白及白斂龍骨當歸厚朴川芎沒藥槐枝栁枝鱉甲苦參香白芷木鱉子草烏頭猪牙皂角烏賊魚骨已上各一分乳香一錢黃丹一兩半清麻油肆兩冬月用半斤右件藥除下黃丹將諸藥油內慢火煎得油色紫赤濾去藥材不用入黃丹在油內先用黃丹一半於油內不住手攪煎得色似黑更入一半黃丹不住手攪只是用慢火熬得紫色滴在水上不散捻不粘手然後更入黃丹少許再熬如捻著硬時却更入油少許但不粘手是成也如常膏藥攤在紙花上看瘡大小敷貼治熱毒腫硬難消者瘡腫白鶴散寒水石軟者二兩燒不爆散者乃是寒水石燒爆烈散者即是石膏不可用右用炭火燒寒水石通赤細研冷水調少許在瘡高處後用萬金膏貼每日一上用此藥後便軟做瘡頭兒更用七聖散掃膏藥周回腫處藥乾即更掃回瘡化惡肉止痛生肌麝香散寒水石叄兩用炭火燒通赤入膩粉半錢麝香一字同研右如瘡口內有紫惡肉時更乾摻少許在惡肉處後用萬金膏貼每日一上如瘡內膿多每日兩上治疳瘡發背麝香圓麝香半錢輕粉半錢定粉半錢粉霜一字半巴豆叄箇大好者去皮研白丁香肆拾二箇揀直者右先研粉霜麝香且裹起令研巴豆細却合諸藥更同研極細為度如疳瘡深有眼子用水和作挺子任在瘡口內後用萬金膏貼每日一上如膿多兩上如患惡瘡發背魚眼丁瘡有紫惡肉只做散子乾散在惡肉上後用萬金膏貼每日一上或再上且少摻藥如不痛更加此藥生肌止痛合瘡口生好肉時用此紅玉散寒水石二兩炭火燒通赤候冷即細研黃丹半兩右二味同研細乾摻在瘡內後用萬金膏貼每日一上或兩上消熱毒赤腫疼痛不可忍七聖散黃芩一兩去黑皮并心大黃一分白滑石肆兩右為末用冷水調掃腫赤疼處如乾即更掃右瘡藥方一宗士大夫家多有之括蒼何氏始編刻于經驗方或云此方舊有以刻之太山石壁者周子明提㸃傳一宗八道治五發發腦發鬢發眉發頥發背癰疽瘭痼癌一宗藥保不死方才覺寒熱瘡已現發渴即是其證先用車螯散紫背大車螯一名車娥也每箇用草先札定上用鹽泥固濟日乾簇火煅之候通紅半時辰許離火候泠手取敲去泥以器皿合在淨地上出火毒半日許令碾羅為細末沙合收甘草炙碾為末輕粉右每服抄車螯二錢末甘草末一錢輕粉末半錢溫麥門冬熟水調下五更初服至日出時候大便不痛下青緑苔或如黑煤惡物下也次用一生黃土細研末半錢許入蒜叄瓣細爛搗捉薄作叄餅子不拘大小坐於瘡頭上用伏道熟艾炙之百壯少歇與飲食喫再炙之叄伍拾壯也每艾炷伍拾枚換餅子一箇次用六一湯托藥真綿黃耆箭簳者是也木耆不堪誤人稱陸兩以刀劈開揭薄用白沙蜜不酸者一兩微入水少許調解則易塗蘸候搓勻灸之微紫色候冷銼碎不碾羅橫紋甘草炙一兩細銼右拌勻每服抄伍錢水一盞煎至㭍分服之日叄服夜二服次服苽蔞湯苽蔞一箇去皮將穰與子銼碎沒藥一分研甘草半兩生銼右叄味用無灰酒叄升煎至一升分叄服溫餌次用治癰疽等腫壞消毒去惡肉猪蹄湯香白芷甘草獨活露蜂房黃芩赤芍藥當歸右先將獖猪前蹄兩隻只用白水煮軟將汁分兩次澄清去上面油花下面滓肉每用藥半兩投於汁中再煎伍㭍沸濾去滓以故帛蘸藥湯中薄揩瘡上死肉惡血隨洗而下以乾故帛拭乾輕竅减痛仍避風忌人口氣吹之有胡臭人不得入宅猫犬亦忌月候人不令入房次用洗藥散風邪生好肉芎藭銼白蒺藜子搗去尖防風銼右等分為細末每用抄一匙頭煎令沸氣上對瘡候通手以帕子揩洗之前藥一次換後藥兩次易二藥相間洗凡瘡破有頭便用洗藥洗訖便用薄貼傅之薄貼謂膏藥也太上無比靈應神異膏露蜂房一兩銼碎蛇蛻皮半兩細剪𤣥參半兩細銼真綿黃耆叄分細銼真杏仁一兩去皮尖略搗破黃丹伍兩虢州者佳童兒童女亂髮淨洗日乾如雞子大右先用真麻油不用菜子油一斤入鐺便下髮慢火熬候髮消盡次入杏仁濾去滓再入鐺入餘藥熬候焦黃再濾去滓次入黃丹候變色以新栁木箆子攪伍千攪滴入水中看軟硬得所然後傾淨瓷罐子如尚未硬更攪叄百攪也攤用如常日換兩次夜換一次疽發人貼雲母膏痛如刀割不可不審不可不知也亦不得用生肌藥只貼膏藥自然斂合如醫治後時為庸醫藥罨或刀割傷風重者兼以五香連翹湯木香麝香乳香沈香藿香連翹右等分為細末每服二錢水一盞煎至㭍分放溫服無時瘡四邊以金箔先用津液次㸃之也乳香膏治諸惡瘡丹腫能收瘡根聚膿止痛沒藥一分細研通明乳香一分水外浸乳鉢細研真麝香半錢别研膩粉一分黃臘二錢萆麻子一兩右陸件同研極勻為膏用無灰薄紙攤藥貼上留眼子出膿日叄肆次換本在元立一宗方後化毒排膿內補十味散治一切癰疽瘡癤未成者速散已成者速潰敗膿自出不犯刀仗服藥後疼痛頓減此其常試之效也如妳癰腸癰及其它腫毒皆嘗治愈此方歙縣丞胡權得之於異人徽州有石刻及洪景盧夷堅志所載甚詳兹不復録人參去蘆當歸酒浸芎窮防風厚朴製桔梗白芷桂去粗皮不見火甘草炒黃耆蜜浸一方加黃苽蔞一兩去皮稱右拾味選藥貴精皆取淨曬焙極燥方稱人參當歸黃耆各二兩餘各一兩為細末每服自叄錢加至陸錢熱酒調下日夜連進數服以多為妙至瘡口合更服為佳所以補前損絶後患也不能飲者間以木香湯調服但不若酒力之勝耳治發背已發未結成已結成未潰用牛皮膠二兩酒二升生甘草一寸同煮候牛皮膠溶化放溫令病者徐徐飲盡如未結成即消已結成則易潰已潰則易差如未效再用必效治發背癰疽一切毒瘡臘月乾桑葉右不拘多少碾為細末以新汲水調塗瘡上如瘡有膿血即乾摻用之如瘡在腳膝間傅藥了用帛子裹之神效不可具言撮軟癤覆盆子葉微炒油調紙花貼又方五倍子炒焦油調如上用治瘡疥丹毒一切雜瘡魏伯虎瘡藥方內經云諸痛癢瘡皆屬於心心受風熱則血脈凝滯而成瘡風多熱少即癢熱多風少即痛風熱相半即癢痛皆因大病後風熱毒不曽宣利畜於血脈遍身生惡瘡兩腿尤甚或攻刺疼痛或晚間增寒欲作膿水每蓋即熱痛不蓋即疼痛宜服此藥烏蛇一條大而細尾梢長者去頭尾叄寸長截作數劑用極好酒浸叄宿去刺骨皮取好淨肉慢火焙乾𤣥參去蘆頭苦參去木取皮地骨皮去木淨洗白蒺藜炒以新磚二口磨去刺甘草細切炒令黃色防風去蘆淨洗白殭蠶炒斷絲乾蝎以米炒令米微黃為度川芎淨洗已上各半兩草烏半斤肉白者以黑豆一升水煮令草烏都黑惟心中一㸃白為度薄切焙一兩黑牽牛半生半炒以二兩取一兩末枳殼去穰薄切麩炒一兩右件一拾叁味為細末煉蜜搜成劑入石臼中搗百十下圓如梧桐子大每服二拾至叄拾圓溫酒吞下不拘時候日進叄服以利則減不利則加服又方柿樹皮燒煙欲盡以碗蓋滅火研一兩荷葉如前法燒灰取一兩草烏去皮尖半兩硫黃半兩黃連半兩去鬚黃蘖半兩去粗皮胡椒半兩白蕪荑半兩研細辛半兩苦參半兩白礬生研叄錢雄黃細研半兩輕粉一錢右件一拾叄味搗為細末和令勻濕瘡乾摻乾瘡用烏臼油或酥或油臘調塗夜間以手掌多擦藥有癢處即以手掌拂之治熱毒風瘡四聖圓與國侯醫恭傳四方何首烏一兩蔓荆子一兩苦參一兩荆芥穗一兩右件肆味生為細末用酒糊為圓如梧桐子大每服二拾圓至叄拾圎溫酒送下貼瘡烏金散用鯽魚一箇可重陸兩者去腸用柏葉碾細入在魚腹內用紙褁數重次用黃泥固濟煅令存性候冷碾成細末入輕粉一分同勻如瘡乾用麻油調瘡濕乾用又方撫芎不拘多少煅過入輕粉用麻油調塗如瘡濕乾摻洗瘡苦參荆芥防風露蜂房木鱉子白殭蠶五倍子地骨皮桑白皮右件各等分煎洗瘡處治膁瘡纍年不效鯽魚一枚用麻油煎魚焦為度去魚只留油調藥穿山甲不拘多少鹽泥固濟候乾火煅存性為末入輕粉麝香少許研勻先以鹽湯洗瘡却用前件油調藥塗之治漆瘡藝臺葉或用子搗汁塗又方用臘茶調麻油塗治一切惡癬并瘡用茄子花為末乾用油調塗濕乾摻之癮疹入腹亦殺人蠶沙二盞水二盞煮一碗洗又鹽湯洗了以蓼子挼傅之又枳殼銼煎湯洗又牛膝末酒調二叄錢服又蕪菁子末酒調服治一切丹毒川芒消細研為末以水調塗生地黃搗汁塗五葉草爛搗傅或為末以水調塗浮萍草爛搗傅芭蕉根搗自然汁塗竈中黃土以水調塗川大黃搗羅為末以水調塗皆可擇而用之治夏月抓破皮膚成瘡胡桃一箇燒灰入蛤粉白礬少許右研細油調塗治癬妙方川烏香白芷蟬蛻已上各半兩全蝎一分右肆味為細末用羊蹄根自然汁煉蜜為圓如梧桐子大每服二拾圎先安排熱酒一盞去浴堂內解缷衣服了以羊蹄根一枝取自然汁滴在盞內咽下藥便用熱湯澡洗却用羊蹄根代皂角擦之出浴令汗乾便不見癬治疥癆但季良傳猪膏煉油石灰細羅二味以意度多少一處銚內炒以乾為度先鋪紙在地却傾所煉猪膏石灰於其上用盆蓋之出火毒一夜研為末乾擦治小兒浸淫瘡周元亨傳韶粉蛤粉等分輕粉少許右研勻以臘月猪脂調塗治夏月痱子棗葉乾為末和葛粉裛之亦治熱瘤又方兼治汗漬腋下赤腫霜和蛤粉傅之立差冬月瓦木上以雞羽掃取收瓷瓶中或只用雪水亦佳又一方加滑石菉豆粉同和勻無雪水則用新汲水調塗或日乾撲之治瘰癧已破者羯羊糞焙乾為末用油調塗如瘡濕止乾摻治傷折金瘡破傷風治打撲傷損接骨如神方桂漢士傳川烏草烏白薑半夏南星桂去粗皮右各等分為末取生薑自然汁并釅醋各半調上件藥稀稠得所就綿上攤勻褁痛處如乾再將醋并薑汁潤如藥落再換或傷折甚者用藥了以杉木片子夾定此藥用後止疼然後服藥服藥當歸去蘆焙乾稱乳香細研右等分為末每服二叁錢酒調下應痛散治身體偏疼兼無力宣通經絡使血氣和暢延胡索炒當歸去蘆桂心去皮取肉各等分右揀好藥材為細末以酒調下不拘時每服叄錢或肆伍錢量病痛如何用藥多少頻進􅀢酒亦隨人量以知為度尋常閃著筋力挫氣疼痛一服即效治刀斧所傷打撲傷損大能止血生肌定痛用好降真香不拘多少碾為細末臨用時量大小貼瘡口乾摻便乾不疼如神亦不作膿水兼治發背惡瘡等疾洗去膿水乾貼降真須用結實色深者打撲傷損姜帥傳牡礪火煅數次為細末濃煎蘇木酒調下肆伍錢如傷損上體則食後服傷損在下則食前服李武仲云只以降真用無灰酒濃煎服極妙應被傷折皆宜用之治破傷風黃明膠燒存性調二錢以好酒調之治破傷風身體浮腫甚者口噤舌強狀如中風獨聖散用魚鰾燒過存性不拘多少細研每服二錢濃煎蘇木酒調下兩服立效魚鰾乃木匠用作膠者倉卒無蘇木只以溫酒調亦可入少麝香尤妙治刀斧湯火所傷蛇蝎大鼠所咬疥癬等瘡備急百靈膏右於五月五日絶早出門望東去採百草不拘多少惟不得回顧採取滿意方回入杵臼內爛搗如泥量藥多少以意入石灰和勻取出拍成膏日中暴乾遇要用時旋取撚碎如法用刀斧傷乾傅取血止為度湯火傷冷水調開塗傅蛇蝎犬鼠咬傷先以溫水洗以津液調傅疥瘡先爪損以藥末乾傅乾濕癬以醋調傅之其效如神破傷風瘡口作白痂無血者殺人最急治之方雄雀糞直者是研細熱酒調半錢服破傷風牙關緊噤草烏頭去皮防風為末雄黃别研等分每服一字熱酒調灌之亦治洗頭風噤了牙關者如破傷風身體強硬更用天南星二兩防風一兩為末先以熱小便洗瘡貼之有紫汁出效縫金創腸出者桑白皮作線縫之更以熱雞血塗上唐安金藏剖腹用此法便愈小腸氣淋疾痔漏便血祕澀等疾治小腸氣灸法俯卧用艾炷如黑豆大灸足第二指第二節叄壯偏墜左即灸右足右即灸左足其效如神但季良傳專治五淋皆腎虛所致雖病久服之必愈琥珀一分生細研澤㵼一分生石燕子半兩生研極細海金沙半兩葵菜子一分右為細末每服叄錢用新取桑白皮濃煎湯調下食前空心日進叄服如淋退可便服八味圓補之忌炙膊房事熱酒酸物等應下膏血沙石肉淋脹悶者服之如神每疾作飲食不下嘔吐者服之尤妙王稚川傳治沙石淋極疼痛者海浮石為末每服一錢熱酒調下治內痔枳殼圓用好厚枳殼不拘多少去穰細切麩炒黃色為末每末一兩入胡桃肉一箇研勻以蜜圓如彈子大空心細嚼一圓米飲或溫酒下兼用井花水淋洗白金散治久新痔痛如神黃鼎臣傳海螵蛸去粗皮不拘多少右為細末每用二叄錢生麻油調成膏以鵝翎拂上痔藥方如神朱周卿傳連翹枳殼麩炒右等分為粗末煎熱薰溫洗治下血用柏葉不拘多少焙乾為末米飲調下枳殼飲治老人大便風祕不通塞澀妨悶或用蜜導之類不能通者並用之枳殼水浸去穰麩炒為粗末每服一大錢入阿膠二片生薑五片葱白伍莖水一大盞煎至陸分去滓入蜜少許空心溫服次用葱白拾莖爛研塗臍心中却以手巾蘸葱湯自內腎腰間浴尉至小腹下少頃氣透即通犀灰散治五種腸風㵼血下痢糞前有血號外痔糞後有血號內痔大腸不收號脫肛榖道四面有弩肉如妳號鼠妳頭上有孔號漏此藥並皆治之黃牛角䚡一箇銼蛇蛻一條全者猪牙皂角伍鋌穿山甲一處㭍拾鱗銼右四味同入瓷瓶內黃泥封固候乾先以小火燒令煙出方用大火煅令通赤為度候冷取出研為細末每服二錢用胡桃肉一箇取肆分中一分爛研同藥用溫酒調服臨卧服來日辰時再服取出惡物永除根本三茱圎治小腸氣痛山石吳茱茰各一兩金令子取肉并皮一兩青皮去穰舶上茴香馬蘭叄味各一兩右㭍味逐味於銀銚內炒令香為末酒糊圎如桐子大每疾作鹽酒下叄伍拾圎久年不差伍㭍服可除根本治多酒腸風㵼血及熱㵼血至多鮮血箭出如紅線者好實黃連叄兩淨洗日乾分為叄分一分銼作半寸截入陳米一兩微炒紫黃色一分亦銼作截以手炒熱為度一分生同焙為細末研粟米粥和杵數百杵圎梧桐子大每服伍拾圎空心溫陳米飲吞下一服立效如急速不及制只用生黃連為末依法用之二服抵一服功此方治血痢水㵼百發百中走馬寸金圎治男子下元虛冷真氣怯弱肝腎客寒小腸氣痛牽引肋脅繞臍疞痛不可忍者手足厥冷多出冷汗不能屈伸面色青黃時發時止立有神效鄧尉傳云湯樞得之王知省𤣥胡索川當歸銼舶上茴香川棟子各一兩乾全蝎叄箇已上並炒令紫色南木香半兩不炒右件並碾為細末米醋糊圓桐子大每服叄拾圎空心鹽酒下久患服一月可去根治五淋李武仲傳云得之王維先醫師真定器火煆存性研為細末一兩生熟地黃末各一兩右每抄定器末一錢地黃末各半錢煎木通湯調下不拘時候神效治雜病療寸白蟲不拘逺年神效聖功散南木香檳榔等分右為細末濃米飲調叄錢許黎明空心先熟嚼炙猪肉之屬只咽汁吐去滓便服藥辰巳間蟲下其疾永除此方簡易如是而取效神速諸名醫未知有此用之屢驗治十種水氣紫金膏趙判官師沔傳蛇含石二兩用炭一稱蛇含石用新鐵銚盛却入炭中煅通紅用米醋二升傾蛇含石入醋內針砂伍兩用水淘淨焙乾用米醋二升同餘糧於砂鍋內煮乾為度却再入鐵銚內於炭中煆通紅取出令冷吹去灰細研全無砂聲禹餘糧三兩赤石脂一兩細研旋入木香一兩切作片子懷乾肉豆蔲一兩濕紙褁炮香熟川白薑一兩炮川芎一兩白茯苓一兩羌活一兩去蘆頭當歸一兩去蘆頭切片子酒浸一宿杜茴香一兩炒香白蒺藜一兩川附子一隻重㭍錢者炮去皮尖三稜一兩炮青皮一兩去穰陳皮一兩去穰牛膝一兩切酒浸一宿官桂一兩懷乾蓬术一兩炮右件焙乾為細末用無鹽蒸餅湯泡為糊和圎如桐子大每服叄拾圎至伍拾圎溫酒吞下空心食前如不能飲酒白湯亦得忌鹽叄月房室一年患人若介甲眼黑臍凸肚皮光有青筋起或灸並不可下藥患人所食之物精猪肉肚尖肚子白魚銀魚鱸魚白菘菜只用葱椒醋食切不宜用鹽除此外别食並不可食治嵌甲以乳香摻之大妙血竭尤佳又欲去甲者用綿逐旋攖入甲內漸漸添之靸起次用剪子去之治肌衄乃腿上血出用胎髮燒作灰填之即止治腋氣生薑不拘多少濕紙褁煨過爛研如泥擦腋下立效又方白礬火煆取乾為度研一錢輕粉半錢右二味和令勻時乾揩腋下神效隂瘡臘茶伍倍子等分膩粉少許右𫝊之治腳爛丫竹蛀屑氊燒灰紅棗燒存性韶粉黃丹白礬飛右等分為末摻之又方以退鵝掌皮㬠乾燒存性為末摻之治人挫喉氣不來急以冷水嚾之立效治刀傷及竹木刺血出急以自己小便淋洗叄兩次立止不妨入水醉鄉寶屑能寬中化痰治嘔吐惡心解酲醉後雅宜隨意服之陳皮肆兩縮砂肆兩紅豆一兩陸錢甘草二兩肆錢生薑一斤已上並㕮咀鹽一兩丁香一錢銼白豆蔲仁一兩碎巴豆捌粒不去皮殼用鐵線串定九味同用水煮焙乾去巴豆不用遇春仙方丁香沉檀麝一錢更兼香附半錢先飲時少許投壺內席上春風正遇仙人適它方不伏水土故鞋底下土刮取末和水服之專治吐酒鄧尉謙之傳二方桑樹上木耳以新瓦焙乾為末糯米飲調服之治惡指爛嚼黑豆傅之止夜起方益智二拾箇和皮銼碎用水一碗煎至陸分臨卧熱服又方胡桃慢火炮熟溫酒同嚼臨卧下治婦人衆疾治婦人經寒月閉湛濁無時血滯四肢或時結痛子宫久冷