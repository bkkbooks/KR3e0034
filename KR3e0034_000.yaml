body:
  text: 傳信適用方醫家類提要臣等謹案傳信適用方二卷舊本不著撰人名氏宋史藝文志載此書亦不云誰作而别有劉禹錫傳信方二卷考此書每方之下皆注傳自某人中有引及和劑局方者必非禹錫書也馬端臨文獻通考有傳道適用方二卷陳振孫云稱拙菴吳彥夔淳熙庚子撰與此卷帙正同知此即彥夔之書通考屢經傳寫訛信為道也此本由宋槧影寫前後無序跋所録皆經驗之方最可依據中有八味圓問難一條尤深得制方之旨其餘各方雖經後人選用而采擇未盡者尚多末附夏子益治竒疾方三十八道其書罕見單行之本明李時珍本草綱目所載疑或從此鈔出也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:809f566ba08e67536c693fe0b6768bc6405ead0d91f68702a7df90dfbb2e3737
