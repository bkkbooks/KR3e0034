body:
  text: 𫝊信適用方醫家類提要臣等謹案𫝊信適用方二卷舊本不著撰人名氏宋史藝文志載此書亦不云誰作而别有劉禹錫𫝊信方二卷考此書每方之下皆註𫝊自某人中有引及和劑局方者必非禹錫書也馬端臨文獻通考有𫝊道適用方二卷陳振孫云稱拙菴吴彦䕫淳熙庚子撰與此卷帙正同知此即彦䕫之書通考屢經𫝊寫訛信為道也此本由宋槧影寫前後無序跋所録皆經騐之方最可依據中有八味圓問難一條尤深得制方之㫖其餘各方雖經後人選用而采擇未盡者尚多末附夏子益治竒疾方三十八道其書罕見單行之本明李時珍本草綱目所載疑或從此鈔出也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1ad7fc11fd9813b83672b3272111c01073d752fce1b2e69154d7946a1494115f
