燎去毛酥炙三兩蓯蓉洗酒浸四兩兔絲子洗淨酒浸五兩熟地黃淨洗酒浸焙乾六兩右件藥六味搗羅為細末煉蜜為圓如梧桐子大每服三五十圓空心食前用溫酒吞下俞山人鎮心丹黃耆五兩炙熟乾地黃二兩半洗五味子二兩半去枝梗柏子仁二兩半令研逺志二兩半去心稱白茯神五兩去木人參五兩酸棗仁五兩去皮炒稱朱砂三兩别研為衣右為細末煉蜜為圓如梧桐子大以朱砂為衣此藥性平涼無毒善安鎮神藏補養心氣專治驚憂思慮過傷心氣不足怔忡盜汗亂夢失精卒暴心痛中風不語風癎癲狂客忤不省悲哭無常色脫神瘁飛尸鬼疰恍惚驚悸吐血便血虛勞羸瘦病後虛煩不得眠睡産前安胎産後補虛極有大功種種心疾悉皆主之恍惚驚悸怔忡不止煎人參茯神湯下盜汗不止麥麩湯下亂夢失精人參龍骨湯下卒暴心痛乳香湯下肌熱虛煩麥門冬湯下吐血人參湯下大便下血當歸地榆湯下小便尿血赤茯苓湯下中風不語薄荷牛黃湯下風癎涎潮防風湯下三十圓常服溫酒㦯人參湯下此藥神效不可具述常服安神鎮心益壽延年增減定志圓養心腎安魂魄滋元氣益聰明凡健忘差謬夢寐不寧怔忡恍惚精神昏眊並冝服之陸子夀𫝊鹿茸半兩酥炙逺志一兩去心炒菖蒲炒茯神炒酸棗仁炒乾地黃炒當歸五味各一兩炒人參炒白术各一兩炒麝香一分研入右為末煉蜜圓如桐子大朱砂為衣三十圓人參湯下太上混元丹河車者天地之先隂陽之祖乾坤之槖籥鉛汞之廓胚渾將兆九九數足我則載而成之故為之河車歷驗篇中名曰混沌皮蓋亦生天地隂陽之始為七十二丹之首髙士垂慈始開端緒太上云若欲長生當修所生人之所生實滋于此所以成功靈應非金石草木夜露曉霜之所比倫修真之士服之不輟誠足以還本元補益之道真得其真韓伯成傳紫河車一具用少婦首生男子者良帶子全用東流水洗斷血脈即止入無灰酒三升椒一大合同入砂石磁器內慢火煮候酒欲盡去火候冷取出不用椒只將河車入大砂盆內用大木槌研如泥攤浪裛汁入藥下項沈香半兩人參一兩白茯苓二兩蓯蓉一兩乳香半兩麝香少許右為細末入河車攪勻可圓即圓如梧桐子大真朱砂為衣每服四五十圓空心溫酒下十全散補諸虛不足養榮衛三焦五臟六府冲和清快人參去蘆白术白芍藥白茯苓黃耆大芎乾熟地黃當歸去蘆尾桂去皮甘草炒各等分右㕮咀每服三錢薑三片棗二箇擘破水一盞半煎八分不拘時候去滓溫服八味圓問難但季良傳或問溫杲曰八味圓李兵部云久服可為地仙今老者服之而腹痛少者服之而發瘡或小便頻數或小便結澀或眼昏或精滑泄其故何哉杲曰是八物修事失製度非方之罪今貨地黃以緑礬豆豉浸蒸欲其易乾也地黃性本涼加以礬䜴性冷此老人所以腹痛附子多是重三四錢此是漏籃側子大熱有毒此少者所以發瘡小便頻數澤㵼生也小便結澀者山茱茰不去核也今具八味修事如後地黃生者去土投水中浮者為天黃中者為人黃沈者為地黃先將地黃蒸良久天黃人黃搗汁取蒸地黃投其汁中候冷如此者三曝乾以酒浸一宿蒸曝乾山藥竹刀刮去皮布巾揩淨切作片子向皂角刺上曝乾茯苓為末水飛過掠去筋膜曝乾澤㵼研成塊子酒浸一宿略蒸山茱茰溫水浸良久取肉去核每一斤得肉二兩許黑附子緊實重七錢者銚內以熱灰炮裂去皮臍牡丹皮去心及粗皮以酒浸一宿桂削去外粗皮不可焙八味同於石臼中搗為末不可犯銅氣如是修合服之而仙復何疑哉久服去附子㨂淨五味子代之煎附子法蜀人王季逺傳生大附子一箇重九錢以上者生去皮臍切片槌碎亦得用水三大盞入晉棗十枚生薑切二兩炭火銀石器煎别用水一盞遇沸即以水旋旋㸃之㸃盡水煎至一大盞為度取滓再用水二盞煎至一盞同前一盞共用沉香磨一錢青鹽一錢再煎沸即止放溫分作兩次服服畢以蒸餅壓之再溫第二服止用重湯溫不可再煎也酒煎附子四神丹治一切虛冷之疾升降隂陽順正祛邪消風冷痰涎散結伏滯氣通利關節破瘀敗凝澀奔衝失經之血接助真氣生續脈息補腎經不足利膀胱小腸祕精固氣定喘止逆壓煩躁養胃氣療五臟虧損下虛上壅胸中痰飲臍腹冷積奔豚氣衝上下循環攻刺疼痛脾寒冷汗中風痿痺精神昏亂霍亂吐㵼手足逆冷隂毒傷寒四肢厥逆形寒惡風向暗睡臥乍靜乍亂婦人産後諸疾血氣逆潮迷悶欲絶赤白帶下崩漏不止應久新諸病未能辨别虛實冷熱證候用藥未效悉宜此藥分勻隂陽氣正便遂安和至不得已詳證乃服水窟雄黃雌黃辰砂透明硫黃右四物各半斤並别研水飛過滲乾再同研勻用蜜水相和令潤緊毬作一毬惟緊為妙次用雞清磨濃墨塗薄紙作崑崙紙表裏俱塗厚塗為妙裹前藥三重再以濃墨塗之候乾用燒藥合子一箇無大合子即分作兩處裹盛先以牡丹根皮燒煙熏合子令釅煙氣黑黃色入所裹藥在內約留離合子口下及一指以醋調臘茶作餅子蓋定與合子口縫平用赤石脂泥固濟合子用合蓋子蓋之令嵓却用紙筋鹽泥通裹合子固濟約厚一寸放令極乾如有紋以水再泥補勿令有縫候乾看有縫再補之入灰泥頂上二寸灰每日邜酉以四兩熟火如裝香法養十四日取出地面上用醋灰把定炭五斤圍一煅於淨室中不令婦人雞犬孝子見候火冷取出丹藥吹去草灰令靜一法初用炭火燒熱次加少火燒令通赤常約令火五斤以來漸漸添火氣小却添至五斤以來照顧勿令炭厚薄不一可添至三稱去火漸令冷入在地坑內深一尺已上用好黃土蓋之候三日取去打破合子取藥細研研三日如粉若只如此便用糯糊圓即伏火四神丹也約三十兩末别入下項藥故曰四神附子煎胡椒末蓽撥末各七兩真赤石脂末三兩好官桂心末六兩附子及七錢已上者炮去皮臍取末十二兩以好法酒一㪷熬至三升然後入附子末為糊和前藥右圓如雞頭肉大留少酒膏恐藥乾候乾輕病每服一粒重病二粒至三粒米飲湯下空心食前溫酒鹽湯亦得小兒吐㵼慢驚研一粒米飲灌下如有固冷陳寒宜常久服餌如病安愈不得多服如覺熱渴即加木香桂末一錢同和服之趙丞相云此方得之國醫李安仁安仁云此藥比之四神丹尤為有造化也神仙養氣丹補虛養五臟接氣助真陽治男子五勞七傷腎氣冷憊精耗髓竭耳鳴目眩腰膝冷痛小便頻數怔忡健忘神思不樂婦人血海虛冷臍腹㽲痛經脈愆期赤白帶下久無子孕雖孕不成及治脾胃虛弱浮腫氣滿全不思食腸鳴切痛大便滑泄新病差後氣短力微真氣不復形容憔悴但是虛冷並皆治之此是煅煉非火力僭燥既濟心腎之功速有神效沈德器傳代赭石一斤火煅赤醋淬十數遍紫石英禹餘糧各半斤火煅赤米醋淬數遍赤石脂半斤不須醋淬四味研為細末水飛極細入甘鍋內封口鹽泥固濟候乾用炭三十斤煆火盡為度再研細如粉天雄炮裂去皮臍附子炮去皮臍肉豆蔲濕麵褁炮香去麵丁香沈香胡椒破故紙炒香乳香别研入沒藥别研入鍾乳粉别入已上十味各一兩一方去丁香胡椒入當歸血竭亦等分右為細末和勻用粽子入少湯研開搜藥為圓如雞頭肉大或差小亦可每服三四粒虛甚者服一二十粒空心溫酒溫湯下既濟丹治諸虛不足膀胱腎經痼敗隂陽不交致生多病凡水欲升而沃心火欲降而溫腎如是則坎離既濟隂陽協和火不炎而神自清水不濟而精自固久服祕精補益永無膏淋白濁遺精之患神效非一難以具述辰砂一兩附子六錢以上重四箇生去皮臍各切下頂剜空心中安朱砂在內以前頂子蓋定用線扎木瓜大者二箇去皮穰切開頂入朱砂附子四箇在內以木瓜元頂子蓋之線扎定爛蒸訖取出附子切作片焙乾為末辰砂别研細木瓜研如膏若得宣木瓜為妙鹿茸二兩作片酥炙當歸洗焙稱一兩逺志二兩去心焙乾稱兔絲子水淘酒浸爛研成膏焙乾為末稱一兩半柏子仁别研一兩沈香一兩杜仲去粗皮一兩半酒浸一宿巴㦸去心稱一兩肉蓯蓉切細酒浸一宿焙乾一兩黃耆蜜炙稱一兩五味子去皮稱一兩半牛膝去苗銼酒浸乾稱一兩石斛去苗酒浸一宿乾一兩右件同為細末用茯神乾山藥各一兩為細末酒煮作糊同木瓜膏及前件藥末搜和為圓如梧桐子大每服五十圓空心米飲下溫酒或菖蒲鹽湯皆可治眼目耳鼻六一圓明目養血補氣蘇連叟傳三方七錢附子兩隻炮去皮臍尖取肉一兩當歸去蘆尾取身切片㬠乾取淨肉六兩右為細末蜜圓梧桐子大每服三五十圓溫酒鹽湯下食前三仙圓明目甘菊花一兩蒼术米泔浸去油椒紅各二兩右為末酒糊圓桐子大每服三五十粒食前茶酒下枸杞煎生取枸杞自然汁銀石器熬成膏入白茯苓末白沙蜜黃臘少許每服一匙溫酒鹽湯化下四聖圓治逺年近日風赤翳膜攀睛倒睫等眼疾四方皆得之朝子止侍郎川黎椒去合口者并黑子不須去白自羅不下於土銚內􅘮令得所鋪紙一張於地上頓椒出火毒熟乾地黃枸杞子荆芥穗右等分為細末煉白沙蜜為圓如桐子大每服十圓至二十圓空心鹽湯下補肝明目羊子肝批開新瓦器內煿乾蓼子仁半升草决明子四兩右為末酒糊圓如桐子大每服三十圓食前米飲下治眼去昏澀益明快生熟地黃各二兩椒一兩右為末蜜圓桐子大每服二十圓空心鹽湯下治赤眼周元亨傳用四物湯每服加熟大黃一塊如栗子大者同煎服食後明目黃公友傳云得之沈元鼎丞相用車前草自然汁調朴硝末臨睡塗眼胞上來早洗去又一方用蜜陀僧一錢細研蜜一兩入磁瓶用新栁枝塞瓶中用油單密封用黑豆七八升鐺內煮以豆熟為度去豆㸃眼椒紅圓眼藥王醫師方服藥旬日黑花並除羅孟弼傳地黃二斤洗淨焙乾川椒一斤去合口并目焙乾蒼术三斤米泔浸三日焙乾右藥揀淨搗為細末麵糊為圓梧桐子大每服三十圓食前溫酒或鹽湯下日二服治他物傷目睛疼痛不可忍者黃牛尿以少許㸃眼中立效治􅂒耳青橘皮燒灰研為末用綿褁如雞頭大窒耳中日三四易治鼻衄趙判官師沔傳蒲黃水調下又方飛羅麵二錢鹽一錢新水調下口齒咽喉烏髭方附治大人小兒口瘡杏仁去皮尖爛研入輕粉成膏口中嚼閉口少時灌漱用冷水漱吐出取下爛肉便安勿咽下又方醋調茱茰末塗腳心天南星末亦可男左女右又方治虛熱上攻口瘡附子一箇炮去皮臍切片水兩大碗煎至一小碗入沈香末二錢再略煎候冷服空心早晨先服黑鍚丹百粒大要治虛熱上攻者一方用四味黃耆建中湯煎放冷服亦妙又方用五倍子為末摻瘡上又方蜜陀僧研細以生蜜丸彈子大含化地黃散歌出僧文瑩湘江野録猪牙皂角及生薑西國升麻熟地黃木律旱連槐角子細辛荷葉要相當荷葉取心用青鹽等分同燒煅研殺將來使最良擦齒牢牙髭鬢黑誰知人世有仙方勝金散治腎熱上蒸牙齗浮腫牙齒疼痛或腎元虛冷牙齒搖動或赤腫痛風牙蟲牙並皆治之老生薑十兩切作如錢薄攤箕內令水縮次用砒霜一錢重細研拌薑錢令勻留少許砒放鎔銀甘沙鍋子內砒拌生薑於上按令緊用新瓦一片蓋鍋口烈炭火煅令煙盡傾於碗內盞子合定存性要成黑炭不可白却蓽撥二錢全蝎二錢去肚內腸屎并毒華隂細辛二錢味辛如椒者胡椒二錢右四味焙乾薑炭亦為細末拌勻每用手指㸃少許如黑豆大揩牙齗上閉口候有涎沫即吐去立效此方乃宜黃醫者以此為業甚所祕惜李元佐得之以傳但季良云治牙疼極效南華椿老傳川百藥煎半兩雄黃二錢延胡索三錢右為細末先用爛研生薑揩牙搜盡涎嗽去却用此藥揩之咽下亦可如牙腫牽連頭靣用此即差又方萬正淳傳巴豆一粒不去皮膜川椒少許約三十粒右先碾椒入巴豆為末飯為圓如菉豆大以綿裹安在蚛牙孔中立效又方黃連黃蘖大黃右為末生薑自然汁如梧桐子大捻作餅隂乾貼在痛處一㸃雪治喉閉喉腫陶贊仲傳焰消三兩研細如粉白礬溶飛過稱一兩右二味拌勻以一錢摻口中口噤不開者用半錢入於小竹筒內吹在鼻中如口內血出即用新水嗽之忌熱麵一捻金治咽喉銅緑黃蘖香白芷各等分右為極細末入麝香少許每一字以筆管吹入喉中治喉閉生礬末吹入喉中通關散治一切咽喉危疾盆硝甘草蒲黃白殭蠶青黛已上並等分生用右為細末每用一字乾摻在舌上津咽一捻金散治喉閉欲死方及治咽喉痛何仲顔傳全蝎微炒鬱金白殭蠶去絲頭炒甘草炙已上各半兩地龍八錢重右為細末每服少許乾摻舌根不數次立愈治喉閉咽喉塞喘息不通須臾欲絶神驗絡石草一名石薜荔二兩水一升煎取一大碗去滓細細喫須㬰即通治喉閉如聖散白殭蠶天南星並生用右等分為末以生薑自然汁調一字許用筆筒灌在喉中立效仍咬乾薑一皂子大引涎出治咽喉中結塊核不通水食危困欲死者大效百靈圓右用釡砥百草霜不拘多少研細蜜和為圓龍眼大每一圓新汲水化開灌下甚者不過三圓即愈治喉閉腫腮涎結成核走馬􅀈喉諸風欲死者黃金散大黃鬱金天南星宣連蝎已上各半兩巴豆别研二錢半右除巴豆餘為末入和勻壯者一錢老少者半錢生薑蜜水調下此藥有毒須量人氣血虛實加減服凡服此藥以㵼為度凡喉閉忌以手搯摘破或即時再結愈甚或成宿疾時時仍發如急喉閉未有藥先用漆筯二隻燒令有烟含口中不得出氣候烟搶著發嗽即破然後次用别藥又先飲生油令氣通候合他藥又巴豆一箇微煨過去皮用綿裹安耳或鼻中如瘡破即除去又白殭蠶直者為末生薑自然汁調下一二錢大妙又桔梗甘草各一兩銼用水五盞煎數沸服有膿出即愈又濃煮桂汁服一盞亦可末桂著舌下漸咽之又含雞屎白又含升麻又急拔頂心髮數莖治喉閉纒喉風百藥不效疾勢危甚死在須㬰用此便蘇再能生人不蛀皂角兩挺以水一大盞許挼濃汁濾去滓對入生麻油攪勻每服一盞强令服之未吐再一服有病者先用它藥不效即急用此治咽喉痛百藥煎去黑皮鵬砂甘草白礬生右等分為細末每服一錢食後米飲調細細呷之王醫師法生蘿葡切作片冬月臨臥時喫三兩片可無咽喉之患治重舌口中涎出用蒲黃傅舌上治氣虛牙疼及風蚌牙為虛氣所攻而發者豫昔患此厯試諸藥不驗里中黃醫教豫用骨碎補二兩細銼炒黑為末乳香一錢研細入和勻揩牙根良久漱之遂愈治新久風牙疼腫不可忍逡巡散李武仲傳髙良薑一塊約二寸許乾全蝎一枚瓦上焙乾右件藥為細末以手指蘸藥如齒藥用須擦令熱透須臾吐得少涎以鹽湯嗽大效治牙疼不可忍者鄧尉謙之傳乳香一錢胡桃一分蓽撥一分附子皮尖一錢蝎梢半錢右件藥為細末擦牙痛處少時用荆芥湯嗽過烏髭鬢方程子正傳烏賊魚骨韶粉黃丹蛤粉密陀僧五味各等分研細輕粉少許石灰少許右件藥一處和勻湯調稀稠得所箆子塗髭鬢上用荷葉包貼荷葉先於熱湯內漂過髭鬢亦須先淨洗方可塗藥治腳氣中嶽湯治濕氣腿腳赤腫疼痛及胸膈痞滿氣不升降遍身疼痛并治腳氣赤芍藥六兩甘草半兩炙右為㕮咀每服半兩水二大盞煎八分一盞去滓服不拘時候五香圓治乾濕腳氣風毒腫弱遇發寒栗不欲飲食行立不得神效方賈彥澤傳乳香二錢輕炒令溶候冷研細木香二錢生用不見火沈香二錢生用楓香一分水煮過研細麝香半錢别研同楓乳後入沒藥二錢酒浸少時研成膏子入糊天麻二錢酒浸訖銼碎白附子一兩酒浸少時銼乾蝎一兩用火燒地令紅將醋潑地上覆定一時去毒川烏一兩酒浸一宿炮裂去皮尖取半兩草烏半兩酒浸一宿炮裂去皮尖取一分白花蛇去皮骨取肉一兩酒浸炙令赤色烏蛇一兩如前製地龍一兩炒去土取半兩大附子一分炮製去皮尖稱蟬退二錢用鹽水浸少時焙乾白蒺藜一兩去尖麒麟竭二錢别研無名異二錢同自然銅醋炒訖研自然銅二錢醋炒乾研朱砂二錢别研為衣右為末酒糊為圓如梧桐子大朱砂為衣每服十五或二十圓溫酒或木瓜湯下食前痛甚者三兩服即止木瓜丹治腳膝疼重不能逺行久立常服補腎氣調血脈左康叔傳宣州木瓜一箇杜木瓜大者亦可用取去穰隔切出蓋子用好熟艾填在木瓜內須滿實却用蓋子覆之竹杖簽定飯甑上蒸爛入羌活一兩獨活二兩附子半兩炮同為末先杵木瓜令爛次下藥末搗成膏子圓如梧桐子大食前溫酒或鹽湯下三五十粒治腳氣大木瓜一箇取成瓮子小者二箇全蝎一兩白牽牛黑牽牛各半兩半生半熟破故紙半兩半生半熟右為末內木瓜中九蒸九曝研爛為圓炒茴香鹽酒下每服三十圓食前木瓜圓治腳氣陶茂安傳二方牛膝細切綿黃耆細切肉蓯蓉薄切已上三味各用無灰酒浸夏月七日冬月十四日如要急用將熳火量煮何首烏去皮銼碎天麻切已上五味各五兩萆薢洗切狗脊去毛細銼京續斷去蘆銼碎青鹽各二兩右都為末用大木瓜兩箇各去皮穰每箇取成一蓋子將青鹽分作兩分每箇入一分在內於飯上蒸令熟研爛圓前藥如木瓜圓不就即將所浸藥酒打麵糊添圓每服三十圓空心溫酒下無忌圓如梧桐子大又方肉蓯蓉好酒焙乾淨洗川牛膝去苗洗焙乾天麻明白者洗焙乾木瓜乾者已上各銼碎用酒三升入瓶內密縛春五日取出急用沸湯漉過焙為末枸把子㨂淨洗黃耆洗塗蜜炙真虎骨酒浸炙黃青鹽二兩别研已上各二兩右件都拌勻將前項浸藥酒入麵作糊為圓如梧桐子大焙乾每服三五十圓溫酒白湯空心食前吞下傳信適用方卷上
