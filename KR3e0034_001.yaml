治之地榆二兩炒御米殻四兩蜜炒陳皮一兩浸洗去白藿香一兩洗去土黄連一兩甘草一兩炙蒼术一兩米泔浸三日炒右為麄末每服二錢水一大盞煎至八分去滓通口服併二服滓再煎作一服共三服無不取効御愛圓治榮衛氣虚風邪進襲腑臟之間值腸胃虚弱糟粕不聚便利赤白或作膿血臍腹疼痛心胷痞滿裏急後重煩滿渇逆脇肋脹悶腸内虚鳴四肢倦乏不進飲食並宜服之黄鼎臣傳御米殻四兩以蜜炒黄紫焦色乾蒸餅切如骰子塊以蜜炒焦色右為細末煉蜜為圓如鷄子黄大每服一粒水一盞煎化為度熱服不拘時候肉豆蔲散治赤白痢如神訶子四箇木香一錢肉豆蔲六箇用麪煨香熟去麪只用肉豆蔲右為細末每服二錢陳米飲調下空心食前日進三服草菓飲主腸胃冷熱不和下痢赤白及伏熱泄㵼臟毒便血悉治之兼主脾胃南華主僧元椿傳草菓子甘草地榆枳殻去穣麩炒右等分為麄末每服二錢用水一盞半煨薑一塊拍碎同煎七分去滓服不拘時候肉豆蔲散治赤白痢無藥可治者其効如神肉豆蔲切片炒黄櫻粟殻搗碎用蜜拌勻炒令黒黄甘草剉炒黄黒色亁生薑切細炒黄黒右等分為末每服六錢如赤多加炙黄甘草一寸若白多加炒生薑一塊同煎用水須二大盞煎至一盞半通口服不計時兩服滓再煎作一服治大人小兒吐㵼訶子一兩藿香一兩肉豆蔲二箇右為末蜜圓隨大小米飲化下木𤓰萬補圓治脾胃乆虚大腸積冷下痢白膿或腸滑不固乆服諸藥未効服之神驗産前産後皆可服立効劉好古所處方但季良傳人參一兩半白术一兩陽起石一兩火煅細研肉蓯蓉二兩淨洗酒浸一宿切焙肉桂一兩去皮縮砂仁一兩赤石脂一兩肉豆蔲一兩麵褁煨熟當歸一兩半切焙鍾乳粉一兩草豆蔲一兩半去皮炮沈香一兩地榆半兩蓽撥一兩牛乳半盞慢火煎亁焙白薑一兩炮茴香一兩炒大麥蘖半兩炒神麴半兩炒丁香一兩厚朴一兩去皮薑製乳香一兩半白茯苓一兩櫻粟殻和米者二十枚炙大附子一箇七錢已上者炮去皮臍嫩茄茸一兩半酥炙微黄右件為末入别研者勻以木𤓰去穰蒸爛同藥末𢷬和得所圓如桐子大㬠乾每服三十圓空心食前米飲下併頻加至五七十圓治禁口痢敗毒散入倉米五六十粒同煎一服取効神効痢藥乳香散白梅一兩燒灰棗子一兩燒灰甖粟殻一兩燒灰呵子半兩燒灰右為細末每服一二錢水一小盞乳香黒豆大壹塊同煎至七分不拘時候温服妙應湯治大人小兒赤白痢櫻粟殻七箇擘破一半生用一半用蜜塗炙微黄烏梅三箇連核甘草七小寸一半生一半炙大棗七箇擘破生薑七大片薤白二十一莖麄大者小者倍之右為挫散都作一服用水二大碗煎至一碗去滓得一碗稍熱服不計時候分作三服小兒量大小加減服之神効治血痢不止地榆浄洗曝乾為細末每服二錢摻在羊血上火炙熟爛嚼米飲下如不喫葷即以捻頭煎湯調下治暑月膿血痢晝夜頻併不止腹痛不可忍者楮葉二七枚生用將焰火燒為黒灰淹梅水少許以冷水解破調服治痢萬金散累試神効甖粟殻一兩赤痢蜜炙白痢淡炙赤白半蜜炙陳皮半兩淨洗去白赤痢焙亁白炙赤白者相半甘草三錢半如前右為麄末每服四錢百沸湯一盞泡急用厚紙三兩重密蓋勿令透氣候兩頓飰乆去滓服再以滓用沸湯七分盞浸血多入烏梅不搥碎同浸一服神驗切忌生冷魚腥必效飲子治赤白痢不問老幼並治之王景明傳甖殻二錢半木香二錢半甘草二錢炙地榆二錢右為末每服二錢米飲調下大㵼腹痛李氏治證呉守景先傳有人每日早起須大㵼一行或時腹痛或不痛空心服熱藥亦無効後有智者察之令於晚食前更進熱藥遂獲稍安常服竟無恙盖煖藥雖要平旦空腹至晚藥力已過一夜隂氣何以敵之於晚間再進熱藥則一夜煖藥在腹遂可以勝隂氣凡治冷疾皆如此又有人乆患㵼泄以煖藥補脾及分利小水百種治之不愈毉候之心脈獨弱以益心氣兼補脾藥服之遂安盖心火也脾土也火生土脾之旺頼火之燥心氣不足則火不燥脾土受濕故令泄㵼今益心補脾而又能去濕豈有不効者乎又有一種泄㵼作冷作積作心氣不足治之及服硫黄附子甚多皆無効因服火蘝圓而愈此腸胃有風冷也胃風湯兼服煖藥亦佳又有一種痰毒㵼兼吐服痰毒藥下之而愈又有一種脾泄㵼服太山老李炙肝散而愈乃白术白芷桔梗白芍藥四味也暑月破腹一曰傷暑二曰傷冷物食𤓰菓飲水之類三曰夏季心火旺心經熱則小水不利行大腸謂之水糓不分傷暑而㵼者心燥頭痛作渇宜服香薷散烏金散傷冷物而㵼腹痛水㵼糓食不化宜服煖藥如附子及理中圓二氣丹正元丹紫蘇子圓之類水糓不分者冝服大順散五苓散此二藥專分清濁暑月多此疾故人多用之凡㵼不可急以熱藥止之恐成痢痢有赤白凡人患痢不問赤白脈小身涼者易安脈大身熱者難差患痢未有不腹痛者皆縁有積也暑積及熱積多患赤痢冷積多患白痢亦有腸胃有風而患赤痢者有冷熱不調而患赤白痢暑積痢及熱痢可用黄連阿膠圓又綿煎散加滑石白痢用駐車圓感應圓之類冷熱不調用戊巳圓巴豆圓黄圓子之類綿煎散入滑石治赤痢極有功又有豆飲子加減亦有功治諸般痢用之每有効官局靈砂丹亦甚竒此數藥自夏及秋皆不可闕也痢有赤白有人乆患痢疾赤白兼下或純白或赤百藥不愈者病乆服藥已多治痢多用毒藥後擊得臟氣不和所以難愈史載之用輕清和氣藥與之遂安後来屢用有驗其方用嬰粟殻蜜炙人參白术白茯苓川芎甘草炙黄耆等分為細末每二錢薑棗水一盞烏梅半箇煎至八分温服不計時候補益沈香鹿茸圓補益下元滋飬眞氣明目駐顔治諸虚不足乆服大有神効曽慶祖傳沈香一兩大附子炮去皮臍二兩鹿茸燎去毛酥炙三兩蓯蓉洗酒浸四兩兔絲子洗淨酒浸五兩熟地黄淨洗酒浸焙亁六兩右件藥六味搗羅為細末煉蜜為圓如梧桐子大每服三五十圓空心食前用温酒吞下俞山人鎭心丹黄耆五兩炙熟乾地黄二兩半洗五味子二兩半去枝梗栢子仁二兩半令研逺志二兩半去心秤白茯神五兩去木人參五兩酸棗仁五兩去皮炒秤朱砂三兩别研為衣右為細末煉蜜為圓如梧桐子大以朱砂為衣此藥性平涼無毒善安鎭神藏補養心氣專治驚憂思慮過傷心氣不足怔忡盜汗亂夢失精卒暴心痛中風不語風癎癲狂客忤不省悲哭無常色脫神瘁飛尸鬼疰恍惚驚悸吐血便血虚勞羸瘦病後虚煩不得眠睡産前安胎産後補虚極有大功種種心疾悉皆主之恍惚驚悸怔忡不止煎人參茯神湯下盜汗不止麥麩湯下亂夢失精人參龍骨湯下卒暴心痛乳香湯下肌熱虚煩麥門冬湯下吐血人參湯下大便下血當歸地榆湯下小便尿血赤茯苓湯下中風不語薄荷牛黄湯下風癎涎潮防風湯下三十圓常服温酒㦯人參湯下此藥神効不可具述常服安神鎮心益壽延年増減定志圓養心腎安魂魄滋元氣益聰明凡健忘差謬夢寐不寜怔忡恍惚精神昏眊並冝服之陸子夀𫝊鹿茸半兩酥炙逺志一兩去心炒菖蒲炒茯神炒酸棗仁炒乾地黄炒當歸五味各一兩炒人參炒白术各一兩炒麝香一分研入右為末煉蜜圓如桐子大朱砂為衣三十圓人參湯下太上混元丹河車者天地之先隂陽之祖乾坤之槖籥鈆汞之廓胚渾將兆九九數足我則載而成之故為之河車歴驗篇中名曰混沌皮蓋亦生天地隂陽之始為七十二丹之首髙士垂慈始開端緒太上云若欲長生當修所生人之所生實滋于此所以成功靈應非金石草木夜露曉霜之所比倫修眞之士服之不輟誠足以還本元補益之道眞得其眞韓伯成傳紫河車一具用少婦首生男子者良帶子全用東流水洗斷血脈即止入無灰酒三升椒一大合同入砂石磁器内慢火煑候酒欲盡去火候冷取出不用椒只將河車入大砂盆内用大木槌研如泥攤浪裛汁入藥下項沈香半兩人參一兩白茯苓二兩蓯蓉一兩乳香半兩麝香少許右為細末入河車攪勻可圓即圓如梧桐子大眞朱砂為衣每服四五十圓空心温酒下十全散補諸虚不足養榮衛三焦五臟六府冲和清快人參去蘆白术白芍藥白茯苓黄耆大芎亁熟地黄當歸去蘆尾桂去皮甘草炒各等分右㕮咀每服三錢薑三片棗二箇擘破水一盞半煎八分不拘時候去滓温服八味圓問難但季良傳或問温杲曰八味圓李兵部云乆服可為地仙今老者服之而腹痛少者服之而發瘡或小便頻數或小便結澁或眼昏或精滑泄其故何哉杲曰是八物修事失製度非方之罪今貨地黄以緑礬豆豉浸蒸欲其易亁也地黄性本涼加以礬䜴性冷此老人所以腹痛附子多是重三四錢此是漏籃側子大熱有毒此少者所以發瘡小便頻數澤㵼生也小便結澁者山茱茰不去核也今具八味修事如後地黄生者去土投水中浮者為天黄中者為人黄沈者為地黄先將地黄蒸良乆天黄人黄搗汁取蒸地黄投其汁中候冷如此者三曝乾以酒浸一宿蒸曝乾山藥竹刀刮去皮布巾揩淨切作片子向皂角刺上曝乾茯苓為末水飛過掠去筋膜曝乾澤㵼研成塊子酒浸一宿略蒸山茱茰温水浸良乆取肉去核每一斤得肉二兩許黑附子緊實重七錢者銚内以熱灰炮裂去皮臍牡丹皮去心及麄皮以酒浸一宿桂削去外麄皮不可焙八味同於石臼中搗為末不可犯銅氣如是修合服之而仙復何疑哉乆服去附子㨂淨五味子代之煎附子法蜀人王季逺傳生大附子一箇重九錢以上者生去皮臍切片槌碎亦得用水三大盞入晉棗十枚生薑切二兩炭火銀石器煎别用水一盞遇沸即以水旋旋㸃之㸃盡水煎至一大盞為度取滓再用水二盞煎至一盞同前一盞共用沉香磨一錢青鹽一錢再煎沸即止放温分作兩次服服畢以蒸餅壓之再温第二服止用重湯温不可再煎也酒煎附子四神丹治一切虚冷之疾升降隂陽順正祛邪消風冷痰涎散結伏滯氣通利關節破瘀敗凝澀奔衝失經之血接助眞氣生續脈息補腎經不足利膀胱小腸祕精固氣定喘止逆壓煩躁養胃氣療五臟虧損下虚上壅胸中痰飲臍腹冷積奔豚氣衝上下循環攻刺疼痛脾寒冷汗中風痿痺精神昏亂霍亂吐㵼手足逆冷隂毒傷寒四肢厥逆形寒惡風向暗睡臥乍靜乍亂婦人産後諸疾血氣逆潮迷悶欲絶赤白帶下崩漏不止應乆新諸病未能辨别虚實冷熱證候用藥未効悉宜此藥分勻隂陽氣正便遂安和至不得已詳證乃服水窟雄黄雌黄辰砂透明硫黄右四物各半斤並别研水飛過滲亁再同研勻用蜜水相和令潤𦂳毬作一毬惟𦂳為妙次用鷄清磨濃墨塗薄紙作崑崙紙表裏俱塗厚塗為妙裹前藥三重再以濃墨塗之候乾用燒藥合子一箇無大合子即分作兩處裹盛先以牡丹根皮燒煙熏合子令釅煙氣黑黄色入所裹藥在内約留離合子口下及一指以醋調臘茶作餅子蓋定與合子口縫平用赤石脂泥固濟合子用合蓋子蓋之令嵓却用紙筋鹽泥通裹合子固濟約厚一寸放令極亁如有紋以水再泥補勿令有縫候乾㸔有縫再補之入灰泥頂上二寸灰每日邜酉以四兩熟火如裝香法養十四日取出地面上用醋灰把定炭五斤圍一煅於淨室中不令婦人鷄犬孝子見候火冷取出丹藥吹去草灰令静一法初用炭火燒熱次加少火燒令通赤常約令火五斤以來漸漸添火氣小却添至五斤以來照顧勿令炭厚薄不一可添至三秤去火漸令冷入在地坑内深一尺已上用好黄土蓋之候三日取去打破合子取藥細研研三日如粉若只如此便用糯糊圓即伏火四神丹也約三十兩末别入下項藥故曰四神附子煎胡椒末蓽撥末各七兩眞赤石脂末三兩好官桂心末六兩附子及七錢已上者炮去皮臍取末十二兩以好法酒一㪷熬至三升然後入附子末為糊和前藥右圓如鷄頭肉大留少酒膏恐藥乾候乾輕病每服一粒重病二粒至三粒米飲湯下空心食前温酒鹽湯亦得小児吐㵼慢驚研一粒米飲灌下如有固冷陳寒宜常乆服餌如病安愈不得多服如覺熱渇即加木香桂末一錢同和服之趙丞相云此方得之國醫李安仁安仁云此藥比之四神丹尤為有造化也神仙養氣丹補虚養五臟接氣助眞陽治男子五勞七傷腎氣冷憊精耗髓竭耳鳴目眩腰膝冷痛小便頻數怔忡健忘神思不樂婦人血海虚冷臍腹㽲痛經脈愆期赤白帶下乆無子孕雖孕不成及治脾胃虚弱浮腫氣滿全不思食腸鳴切痛大便滑洩新病差後氣短力微眞氣不復形容憔悴但是虚冷並皆治之此是煅煉非火力僭燥既濟心腎之功速有神効沈德器傳代赭石一斤火煅赤醋淬十數遍紫石英禹餘糧各半斤火煅赤米醋淬數遍赤石脂半斤不須醋淬四味研為細末水飛極細入甘鍋内封口鹽泥固濟候乾用炭三十斤煆火盡為度再研細如粉天雄炮裂去皮臍附子炮去皮臍肉豆蔲濕麵褁炮香去麵丁香沈香胡椒破故紙炒香乳香别研入没藥别研入鍾乳粉别入已上十味各一兩一方去丁香胡椒入當歸血竭亦等分右為細末和勻用粽子入少湯研開搜藥為圓如鷄頭肉大或差小亦可每服三四粒虚甚者服一二十粒空心温酒温湯下既濟丹治諸虚不足膀胱腎經痼敗隂陽不交致生多病凡水欲升而沃心火欲降而温腎如是則坎離既濟隂陽恊和火不炎而神自清水不濟而精自固乆服秘精補益永無膏淋白濁遺精之患神効非一難以具述辰砂一兩附子六錢以上重四箇生去皮臍各切下頂剜空心中安朱砂在内以前頂子盖定用線扎木𤓰大者二箇去皮穰切開頂入朱砂附子四箇在内以木𤓰元頂子盖之線扎定爛蒸訖取出附子切作片焙亁為末辰砂别研細木𤓰研如膏若得宣木𤓰為妙鹿茸二兩作片酥炙當歸洗焙秤一兩逺志二兩去心焙亁秤兔絲子水淘酒浸爛研成膏焙亁為末秤一兩半栢子仁别研一兩沈香一兩杜仲去麄皮一兩半酒浸一宿巴㦸去心秤一兩肉蓯蓉切細酒浸一宿焙亁一兩黄耆蜜炙秤一兩五味子去皮秤一兩半牛膝去苗剉酒浸亁秤一兩石斛去苗酒浸一宿亁一兩右件同為細末用茯神乾山藥各一兩為細末酒煮作糊同木𤓰膏及前件藥末搜和為圓如梧桐子大每服五十圓空心米飲下温酒或菖蒲鹽湯皆可治眼目耳鼻六一圓明目養血補氣蘇連叟傳三方七錢附子兩隻炮去皮臍尖取肉一兩當歸去蘆尾取身切片㬠亁取淨肉六兩右為細末蜜圓梧桐子大每服三五十圓温酒鹽湯下食前三仙圓明目甘菊花一兩蒼术米泔浸去油椒紅各二兩右為末酒糊圓桐子大每服三五十粒食前茶酒下枸杞煎生取枸杞自然汁銀石器熬成膏入白茯苓末白沙蜜黄臘少許每服一匙温酒鹽湯化下四聖圓治逺年近日風赤翳膜攀睛倒睫等眼疾四方皆得之晁子止侍郎川黎椒去合口者并黒子不須去白自羅不下於土銚内􅘮令得所鋪紙一張於地上頓椒出火毒熟乾地黄枸杞子荆芥穗右等分為細末煉白沙蜜為圓如桐子大每服十圓至二十圓空心鹽湯下補肝明目羊子肝批開新瓦器内煿亁蓼子仁半升草决明子四兩右為末酒糊圓如桐子大每服三十圓食前米飲下治眼去昏澁益明快生熟地黄各二兩椒一兩右為末蜜圓桐子大每服二十圓空心鹽湯下治赤眼周元亨傳用四物湯每服加熟大黄一塊如栗子大者同煎服食後明目黄公友傳云得之沈元鼎丞相用車前草自然汁調朴硝末臨睡塗眼胞上來早洗去又一方用蜜陀僧一錢細研蜜一兩入磁瓶用新栁枝塞瓶中用油單密封用黑豆七八升鐺内煑以豆熟為度去豆㸃眼椒紅圓眼藥王醫師方服藥旬日黑花並除羅孟弼傳地黄二斤洗浄焙亁川椒一斤去合口并目焙亁蒼术三斤米泔浸三日焙亁右藥揀淨搗為細末麵糊為圓梧桐子大每服三十圓食前温酒或鹽湯下日二服治他物傷目睛疼痛不可忍者黄牛尿以少許㸃眼中立効治􅂒耳青橘皮燒灰研為末用綿褁如鷄頭大窒耳中日三四易治鼻衂趙判官師沔傳蒲黄水調下又方飛羅麵二錢鹽一錢新水調下口齒咽喉烏髭方附治大人小兒口瘡杏仁去皮尖爛研入輕粉成膏口中嚼閉口少時灌漱用冷水漱吐出取下爛肉便安勿嚥下又方醋調茱茰末塗脚心天南星末亦可男左女右又方治虚熱上攻口瘡附子一箇炮去皮臍切片水兩大椀煎至一小椀入沈香末二錢再略煎候冷服空心早晨先服黒鍚丹百粒大要治虚熱上攻者一方用四味黄耆建中湯煎放冷服亦妙又方用五倍子為末摻瘡上又方蜜陀僧研細以生蜜丸弹子大含化地黄散歌出僧文瑩湘江野録猪牙皂角及生薑西國升麻熟地黄木律旱連槐角子細辛荷葉要相當荷葉取心用青鹽等分同燒煅研殺將來使最良擦齒牢牙髭鬢黒誰知人世有仙方勝金散治腎熱上蒸牙齗浮腫牙齒疼痛或腎元虚冷牙齒摇動或赤腫痛風牙蟲牙並皆治之老生薑十兩切作如錢薄攤箕内令水縮次用砒霜一錢重細研拌薑錢令勻留少許砒放鎔銀甘沙鍋子内砒拌生薑於上按令緊用新瓦一片盖鍋口烈炭火煅令煙盡傾於盌内盞子合定存性要成黒炭不可白却蓽撥二錢全蝎二錢去肚内腸屎并毒華隂細辛二錢味辛如椒者胡椒二錢右四味焙乾薑炭亦為細末拌勻每用手指㸃少許如黑豆大揩牙齗上閉口候有涎沫即吐去立効此方乃宜黄醫者以此為業甚所秘惜李元佐得之以傳但季良云治牙疼極効南華椿老傳川百藥煎半兩雄黄二錢延胡索三錢右為細末先用爛研生薑揩牙搜盡涎嗽去却用此藥揩之嚥下亦可如牙腫牽連頭靣用此即差又方萬正淳傳巴豆一粒不去皮膜川椒少許約三十粒右先碾椒入巴豆為末飯為圓如菉豆大以綿裹安在蚛牙孔中立効又方黄連黄蘖大黄右為末生薑自然汁如梧桐子大捻作餅隂乾貼在痛處一㸃雪治喉閉喉腫陶賛仲傳燄消三兩研細如粉白礬溶飛過秤一兩右二味拌勻以一錢摻口中口噤不開者用半錢入於小竹筒内吹在鼻中如口内血出即用新水嗽之忌熱麵一捻金治咽喉銅緑黄蘖香白芷各等分右為極細末入麝香少許每一字以筆管吹入喉中治喉閉生礬末吹入喉中通闗散治一切咽喉危疾盆硝甘草蒲黄白殭蠶青黛已上並等分生用右為細末每用一字亁摻在舌上津嚥一捻金散治喉閉欲死方及治咽喉痛何仲顔傳全蝎微炒鬰金白殭蠶去絲頭炒甘草炙已上各半兩地龍八錢重右為細末每服少許乾摻舌根不數次立愈治喉閉咽喉塞喘息不通須臾欲絶神驗絡石草一名石薜荔二兩水一升煎取一大椀去滓細細喫須㬰即通治喉閉如聖散白殭蠶天南星並生用右等分為末以生薑自然汁調一字許用筆筒灌在喉中立効仍咬亁薑一皂子大引涎出治咽喉中結塊核不通水食危困欲死者大効百靈圓右用釡厎百草霜不拘多少研細蜜和為圓龍眼大每一圓新汲水化開灌下甚者不過三圓即愈治喉閉腫腮涎結成核走馬􅀈喉諸風欲死者黄金散大黄鬰金天南星宣連蝎已上各半兩巴豆别研二錢半右除巴豆餘為末入和勻壯者一錢老少者半錢生薑蜜水調下此藥有毒須量人氣血虚實加減服凡服此藥以㵼為度凡喉閉忌以手搯摘破或即時再結愈甚或成宿疾時時仍發如急喉閉未有藥先用漆筯二隻燒令有烟含口中不得出氣候烟搶著發嗽即破然後次用别藥又先飲生油令氣通候合他藥又巴豆一箇微煨過去皮用綿裹安耳或鼻中如瘡破即除去又白殭蠶直者為末生薑自然汁調下一二錢大妙又桔梗甘草各一兩剉用水五盞煎數沸服有膿出即愈又濃煑桂汁服一盞亦可末桂著舌下漸咽之又含鷄屎白又含升麻又急㧞頂心髪數莖治喉閉纒喉風百藥不効疾勢危甚死在須㬰用此便蘇再能生人不蛀皂角兩挺以水一大盞許挼濃汁濾去滓對入生麻油攪勻每服一盞强令服之未吐再一服有病者先用它藥不効即急用此治咽喉痛百藥煎去黒皮鵬砂甘草白礬生右等分為細末每服一錢食後米飲調細細呷之王醫師法生蘿葡切作片冬月臨臥時喫三兩片可無咽喉之患治重舌口中涎出用蒲黄傅舌上治氣虚牙疼及風蚌牙為虚氣所攻而發者予昔患此厯試諸藥不驗里中黄醫教予用骨碎補貳兩細剉炒黒為末乳香一錢研細入和勻揩牙根良乆漱之遂愈治新乆風牙疼腫不可忍逡廵散李武仲傳髙良薑一塊約二寸許亁全蝎一枚瓦上焙亁右件藥為細末以手指蘸藥如齒藥用須擦令熱透須臾吐得少涎以鹽湯嗽大効治牙疼不可忍者鄧尉謙之傳乳香一錢胡桃一分蓽撥一分附子皮尖一錢蝎梢半錢右件藥為細末擦牙痛處少時用荆芥湯嗽過烏髭鬢方程子正傳烏賊魚骨韶粉黄丹蛤粉密陀僧五味各等分研細輕粉少許石灰少許右件藥一處和勻湯調稀稠得所箆子塗髭鬢上用荷葉包貼荷葉先於熱湯内漂過髭鬢亦須先浄洗方可塗藥治脚氣中岳湯治濕氣腿脚赤腫疼痛及胸膈痞滿氣不升降遍身疼痛并治脚氣赤芍藥六兩甘草半兩炙右為㕮咀每服半兩水二大盞煎八分一盞去滓服不拘時候五香圓治亁濕脚氣風毒腫弱遇發寒慄不欲飲食行立不得神効方賈彦澤傳乳香二錢輕炒令溶候冷研細木香二錢生用不見火沈香二錢生用楓香一分水煑過研細麝香半錢别研同楓乳後入沒藥二錢酒浸少時研成膏子入糊天麻二錢酒浸訖剉碎白附子一兩酒浸少時剉乾蝎一兩用火燒地令紅將醋潑地上覆定一時去毒川烏一兩酒浸一宿炮裂去皮尖取半兩草烏半兩酒浸一宿炮裂去皮尖取一分白花蛇去皮骨取肉一兩酒浸炙令赤色烏蛇一兩如前製地龍一兩炒去土取半兩大附子一分炮製去皮尖秤蟬退二錢用塩水浸少時焙亁白蒺蔾一兩去尖麒麟竭二錢别研無名異二錢同自然銅醋炒訖研自然銅二錢醋炒亁研朱砂二錢别研為衣右為末酒糊為圓如梧桐子大朱砂為衣每服十五或二十圓温酒或木𤓰湯下食前痛甚者三兩服即止木𤓰丹治脚膝疼重不能逺行乆立常服補腎氣調血脈左康叔傳宣州木𤓰一箇杜木𤓰大者亦可用取去穰隔切出蓋子用好熟艾填在木𤓰内須滿實却用蓋子覆之竹杖簽定飯甑上蒸爛入羌活一兩獨活二兩附子半兩炮同為末先杵木𤓰令爛次下藥末搗成膏子圓如梧桐子大食前温酒或鹽湯下三五十粒治脚氣大木瓜一箇取成瓮子小者二箇全蝎一兩白牽牛黑牽牛各半兩半生半熟破故紙半兩半生半熟右為末内木瓜中九蒸九曝研爛為圓炒茴香鹽酒下每服三十圓食前木𤓰圓治脚氣陶茂安傳二方牛膝細切綿黄耆細切肉蓯蓉薄切已上三味各用無灰酒浸夏月七日冬月十四日如要急用將熳火量煑何首烏去皮剉碎天麻切已上五味各五兩萆薢洗切狗脊去毛細剉京續斷去蘆剉碎青鹽各二兩右都為末用大木𤓰兩箇各去皮穰每箇取成一蓋子將青鹽分作兩分每箇入一分在内於飯上蒸令熟研爛圓前藥如木𤓰圓不就即將所浸藥酒打麵糊添圓每服三十圓空心温酒下無忌圓如梧桐子大又方肉蓯蓉好酒焙亁浄洗川牛膝去苗洗焙亁天麻明白者洗焙乾木𤓰亁者已上各剉碎用酒三升入瓶内密縛春五日取出急用沸湯漉過焙為末枸把子㨂淨洗黄耆洗塗蜜炙真虎骨酒浸炙黄青鹽二兩别研已上各二兩右件都拌勻將前項浸藥酒入麵作糊為圓如梧桐子大焙亁每服三五十圓温酒白湯空心食前吞下傳信適用方卷上
