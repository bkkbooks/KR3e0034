body:
  text: 傳信適用方卷上治諸風大聖一粒金丹又名保命金丹治男子婦人一切諸風氣血俱虛隂陽偏廢卒暴中風僵仆昏塞涎潮搐搦不省人事失音舌强手足嚲曳口眼喎斜或癱瘓偏枯半身不隨語言蹇澀舉止錯亂四肢麻痺及治癲癎倒仆目瞑不開涎盛作聲或角弓反張目睛直視口禁悶絶牙關緊急并治風摶於陽經目眩頭痛耳作蟬鳴皮膚瞤搐頻缺喜睡項强拘急不能回顧及腎臟風虛腳膝疼痛步履艱難偏風流注一邊屈伸不得此藥無問久新並能治之黑附子生去皮臍川烏頭如上白附子五靈脂各一兩白殭蠶炒白蒺藜炒兩一已上陸味别為末白礬枯兩一朱砂别研半兩沒藥半兩麝香一錢研乳香半兩研全蝎半兩碎亦可用右將諸藥和得所以井花水磨細墨半兩滴水和圓如彈子大窨乾金箔為衣每服一粒用生薑一兩去皮細擦取自然汁將藥圓於薑汁內磨化盡為度用無灰酒一盞溫服量病人酒性多少更喫溫酒一二升投之以助藥力次用衣被蓋覆便臥汗出為效疾勢輕者每服半圓不拘時候如有風疾常服補益五臟固密真元通流關節袪逐風邪壯筋續骨大有神效治癎疾凌霄花右一味為細末每服叄錢溫酒調下空心服每服藥時解開頭髮用木梳不住手梳以冷水一大碗在側含水口中水溫即換以碗水盡即住梳如此服四十九日永絶根本不論受病淺深皆愈仍百無所忌興國司法姜濤嘗服得效溫腦散治頭風隆興李醫傳川芎二兩天麻川烏炮去皮尖碎銼炒黃各一兩右為細末每服二錢茶調下薄荷茶尤佳乳香宣經圓治男子婦人體虛氣弱寒濕相搏半身不遂手足麻痺行步少力骨節煩疼足脛浮腫皮膚不仁腳膝常冷狀若風吹或時作熱漸成腳氣腳膝生瘡痛癢不仁又治肝腎不足經絡留滯筋脈緩弱舉動皆難四肢攣急不可屈伸臂痛游走或左或右風毒攻疰乍差乍發肩背相引腰膝大痛風痺嚲曳血脈不周閃肭打撲內傷筋骨痛不可忍男子疝氣膀胱上下奔衝婦人月水不調多作腹痛常服活血脈止疼痛補虛損壯筋骨樊防禦祕方天台烏藥葳靈仙酒浸京萆薢茴香炒陳皮黑豆煮川練子肉各一兩半草烏㭍錢銼炒五靈脂半兩乳香半兩别研黑牽牛取粉捌錢右為細末却入乳香拌勻醋糊為圓如梧桐子大每服三十圓溫酒下空心食前太一丹治諸風及癱瘓偏風手足頑麻肢節緩弱骨肉疼痛并治頭風偏正頭痛項頸拘急頭旋目運嘔吐痰水或耳鳴聾風痰上盛及療傷風傷寒頭疼不可忍者並宜服之常服消風化痰清頭目利胸膈川芎川烏去皮尖草烏去皮尖白芷白附子黑附子去皮臍細辛去葉洗半夏洗天南星洗天麻右等分並生用細末如藥二拾兩即入麵二拾兩白者同拌勻滴水和圓如彈子大日中㬠乾每服一粒茶酒任嚼下荆芥薄荷茶亦得如傷風傷寒頭目昏疼用生葱白一莖同嚼熱茶清送下不計時候此藥豫家常合用之甚效治麻痺妙方用四味理中湯加防風天麻等分同煎甚佳或去白术加附子尤妙治頭目旋暈吐􅬏蓋胃冷生痰致有此疾纍用有效止逆湯川乾薑二兩炮甘草一兩炙赤色右二味㕮咀為粗末每服四伍錢用水二盞煎至捌分食前熱服赤茯苓散治隂陽俱虛經絡凝澀氣血不和身體疼痛背膊勞倦手足無力並冝服之赤茯苓去黑皮叄分當歸去苗洗切焙乾叄分木香半兩桂心去粗皮不見火叄分白术一兩枳殼麩炒去穰半兩赤芍藥一兩柴胡去苗洗半兩黃耆半兩炙鱉甲醋炙去裙叄分五味子㨂净半兩桔梗銼炒半兩芎藭半兩橘紅半兩甘草半兩炒右拾伍味同為粗散每服肆錢水一盞半生薑伍片煎至捌分去滓通口服無時治中風涎盛不省人事人參訶子散李武仲傳云得之張魏公家人參訶子青白者炮去核甘草右件各等分為細末每服二錢白沸湯㸃服如卒中風痰壅不省人事急投此藥神效無比即便省也治中濕癱瘓無異中風聖功散右用五積散一兩却入細研真麝香二錢同煎服更多愈妙李武仲傳云得之李與幾治風熱上攻頭目昏眩及療偏正頭疼一品圓大香附子去皮毛用水煮一時久細切焙乾右為細末煉蜜圓如彈子大每服一圓水一盞煎至捌分通口服婦人用醋湯煎治丈夫婦人中風氣痺其疾作之初切不可以治風瞑眩之藥與服若大段有涎即略與不損氣者下涎藥才定如手足緩弱不遂即便與此藥服南木香好者一大分洗銼焙乾為細末右先取好瓜蔞一箇取子及穰去皮將子與穰各研極細用無灰酒一大盞投之攪勻用生絹絞取汁如此研絞叄兩次酒醲無味乃止於銀石器內煎叄兩沸調木香末帶熱服令人按摩病處良久就病處臥移時自能舉動矣此方乃大溈山和尚所傳大溈云氣行則風行氣逆則風聚甚者不過叄伍服大有神驗治感風中暑和解散治感寒表裏未辨頭痛惡心發熱煩疼不進飲食常服正氣除寒邪辟瘟疫不問老少比日可服黃鼎臣傳蒼术洗淨肆兩厚朴製桔梗去蘆各肆兩藿香葉前胡洗去蘆柴胡洗去蘆當歸洗赤芍藥各二兩川芎陳皮去穰炒甘草炙神麴炒麥蘖炒赤茯苓各肆兩半夏麴二兩右粗末每服肆錢水一盞半薑叄片棗一箇煎㭍分去滓服不拘時候葱术散不問隂陽二證染患淺深凡時行瘟疫及尋常風吹雨霎頭目昏重四體熱倦行步少力骨節疼痛悉皆治之蒼术洗淨一斤葱連根鬚洗淨一斤麻黃不去節肆兩甘草二兩炙右將葱术入臼中杵令葱涎相入盆中堅捺令熱冬間半月春夏五七日取出鍋中炒葱葉過焦逐旋篩出以术乾為度次入麻黃甘草為末每服二錢水一盞薑叄片棗一箇煎㭍分去滓熱服如要出汗連進二叄服以衣蓋之常服解諸勞倦行路緩急最為先務參苓散解傷寒治百節疼一切虛勞氣疾並宜服之何伯應傳人參二兩茯苓一兩白术二拾兩銼細桔梗拾兩去蘆橘紅陸兩香白芷叄兩芍藥一兩當歸二兩去蘆頭川芎一兩半半夏一兩湯泡七遍厚朴二兩去皮生薑汁製官桂去皮春夏叄兩秋冬肆兩枳殼肆兩麩炒令黃同桂樁為末乾薑春夏一兩半秋冬二兩麻黃去根節春夏二兩秋冬叄兩甘草叄兩右件一拾陸味各淨洗焙乾除芎桂枳殼别杵外諸藥同為粗末分作陸分於大鐵鍋內以文武火炒令微赤黃為度不可令燋須是勻取出以淨紙襯安板床上候冷勿令侵塵土入前枳殼官桂川芎和勻杵為細末每服一錢水一盞生薑叄片葱二寸同煎㭍分通口服不拘時候治感寒傷風鼻塞頭痛及時行瘟疫老幼皆可服之香芎散香附子炒去皮陸兩川芎香白芷甘草炙已上各二兩藿香葉肆兩石膏研如粉叄兩右同為細末每服一大錢熱茶調下不計時候傷寒瘟疫差後禁忌龎安常論飲酒合隂陽復病必死生鱠煮麵酒韭菌鱓􅐜豆粉犬羊肉腸血生果油肥之類食之皆發熱黃下利不救諸勞動皆致復尚可治女勞多死御愛薑蘇圓治中暑心惡頭疼煩燥生津止渴沈德之樞密傳紫蘇葉㨂淨伍兩烏梅肉切炒二兩甘草生叄分桂去粗皮半兩香薷葉㨂淨半兩生薑洗切焙乾一分木瓜二兩乾者如生去皮穰切焙檀香半兩銼屑右為末煉蜜為圓如櫻桃大每服一圓細嚼熟水送下不以時水瓢圓解暑毒除煩燥生津止渴烏梅肉銼炒二兩甘草一兩炙乾木瓜一兩青鹽一兩研細後入檀香半兩銼屑人參半兩去蘆白茯苓半兩去黑皮麝香半兩研後入右為細末入青鹽麝香拌勻煉蜜為圓每一兩分作二拾圓冷水或熟水嚼一二圓秦芁散治中暑秦芁去土當歸去蘆桔梗黃連去鬚烏梅去核甘草炙青皮去穰柴胡去蘆乾薑炮芍藥右件等分為細末解暑濃煎燈心湯下心痛煎菖蒲湯下㵼痢米飲下常服熟水下骨熱地骨皮湯下二錢治中暑甚妙張魏公行軍時常用上等重羅細麵一味以薑汁及水和成餅子暴乾却碾末收之每用二叄錢新汲水調服治中暑迷悶欲死右取蒜一瓣生嚼以新水送下或不能嚼水研灌之立可救熱死人切勿便與冷水及卧冷地正如凍死人須先與冷水若遽近火即死治夏月大熱因飢中暑暈倒昏塞者急煎米飲徐徐灌之候漸省只與大順散及溫氣藥服或大燥吐悶亂不止急取本人汗頭巾或頭鬚挼汁一盞入青黛一錢調灌須臾吐出惡毒涎水定省後以溫粥飲投之即愈解暑毒黑散子不蛀皂角不拘多少燒煙絶以盆合稱四兩甘草一兩炙為末新汲水調下一錢甚者加一錢一方只用皂角燒成炭末之用水調甚效蓋中暑人痰塞關竅皂角能踈利去痰故也神仙截傷寒四季加減百解散夫四時有不常之氣傷人為病外客肌膚腠理摶於榮衛由饑飽勞役損於五臟六腑或由憂愁思慮居處不常非節之氣因兹觸冒病發四百四種變疾於千七百四十五證遂編類成巢氏病源計五十卷又有八方居民所食鄉土風俗氣候異證竒疾不載數內外其間唯難治者傷寒一門非雜病之比五種不同六經各異隂陽傳受日數淺深藥劑溫涼用有先後況不識法者乎差之毫釐輕者危殆變證百出無復紀律擾擾萬緒起矣且傷寒一家二百七十五證四百一十五道方書一日太陽二日陽明三日少陽四日太隂五日少隂六日厥隂六日六經俱足隨其輕重以吐汗下和解之始末不出六七日之間當必取差傷寒唯兩感一證不治其餘證候雖感異氣能消息之無不愈者又豈可妄投湯劑耶病是陽證陽實則譫語無可疑者病家未諳多用生牢祈祭神廟妄信邪巫加以符禁親戚杜門絶人往來問候務在邀永况傷寒六經之病傳受只有六日之期動經旬月悮致夭傷不可勝計豈不痛哉今傳受神仙截傷寒四季加減百解散無問隂陽二證其間所用藥味各隨經絡治病如傷寒在表未傳入經發熱惡寒腰脊强痛連進二服汗出而愈若已傳經絡胸滿氣逆肢體煩疼目睛痛耳聾口噪咽乾或渴不渴手足自溫或肢厥自利或不自利小便反快連服之則調中順氣祛逐寒邪如首㑹感風風傷腠理頭痛項强表重傷風增寒頭痛鼻流清涕咳嗽涎痰及風濕相摶關節煩疼一身盡重加之惡風時自汗出此藥大能調順三焦扶表救裏溫潤肺經正四時之氣升降隂陽進美飲食和解發散涼汗清肌退熱固表則止九種自汗不問傷風傷寒中暑中渴食蒸頭痛氣逆胸滿失飢吐逆眩暈及已經汗之不解下之不當吐不中病兼此藥清而不涼溫而不壅無問老人虛人大人小兒婦人妊婦亦等宜服專一連進無不取效春常服免瘟疫之疾夏常服不中暑暍秋服無瘧痢之疾冬服不感寒毒真神仙衛生之妙藥也功效不可盡述李武仲傳云得之洪帥呂殿撰柴胡去蘆頭并土升麻乾葛白芍藥白术防風去苗甘草炙羌活獨活藁本去半夏湯洗㭍次薑汁浸蒼术米泔水浸麩炒人參去蘆藿香去梗已上各修事了稱一稱立春已後不加減立夏已後一料加柴胡一分赤茯苓當歸各半兩立秋已後減柴胡一分不用當歸赤茯苓各半兩只加麻黃去節半兩乾薑炮官桂各一分立冬已後並無加減右件同為細末每服叄錢水一盞半生薑叄大片棗子二箇煎至一盞去滓熱服不拘時候併進二服如要表散加白葱叄寸淡豉叄拾粒煎服衣被蓋覆汗出而愈治初感傷寒頭痛發熱小解五毒散李武仲傳云得之王德全二方山茵陳二兩去根焙麻黃二兩去根節蒼术二兩半米泔浸過一宿切焙石膏半兩火煆右為細末每服二大錢熱葱茶調下治傷寒疫氣羌活散羌活一兩洗切焙防風洗切焙牡丹皮洗切焙芎洗切焙當歸去蘆洗切焙甘草微炙伍味各半兩右為銼散每服二錢水一盞薑叄片煎至捌分去滓溫服不拘時候治叄日傷寒仙授散李武仲傳云得之陳庭藻蒼术肆兩米泔浸一夕洗淨稱麻黃肆兩去節稱香附子肆兩去皮毛稱杏仁二兩去皮尖麩炒别研甘草二兩生用右為