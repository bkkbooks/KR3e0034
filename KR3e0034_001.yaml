body:
  text: 傳信適用方卷上治諸風大聖一粒金丹又名保命金丹治男子婦人一切諸風氣血俱虚隂陽偏廢卒暴中風僵仆昬塞涎潮搐搦不省人事失音舌强手足嚲曳口眼喎斜或癱瘓偏枯半身不隨語言蹇澁舉止錯亂四肢麻痺及治癲癎倒仆目瞑不開涎盛作聲或角弓反張目睛直視口禁悶絶牙關𦂳急并治風摶於陽經目眩頭痛耳作蟬鳴皮膚瞤搐頻欠喜睡項强拘急不能囘顧及腎臟風虚脚膝疼痛步履艱難偏風流注一邊屈伸不得此藥無問乆新並能治之黒附子生去皮臍川烏頭如上白附子五靈脂各壹兩白殭蠶炒白蒺藜炒兩壹已上陸味别為末白礬枯兩壹朱砂别研半兩沒藥半兩麝香壹錢研乳香半兩研全蝎半兩碎亦可用右將諸藥和得所以井花水磨細墨半兩滴水和圓如彈子大窨亁金箔為衣每服一粒用生薑壹兩去皮細擦取自然汁將藥圓於薑汁内磨化盡為度用無灰酒壹盞温服量病人酒性多少更喫温酒壹貳升投之以助藥力次用衣被盖覆便臥汗出為効疾勢輕者每服半圓不拘時候如有風疾常服補益五臟固密眞元通流關節袪逐風邪壯筋續骨大有神効治癎疾凌霄花右壹味為細末每服叄錢温酒調下空心服每服藥時解開頭髪用木梳不住手梳以冷水壹大碗在側含水口中水温即換以碗水盡即住梳如此服四十九日永絶根本不論受病淺深皆愈仍百無所忌興國司法姜濤嘗服得効温腦散治頭風隆興李醫傳川芎貳兩天麻川烏炮去皮尖碎剉炒黄各壹兩右為細末每服貳錢茶調下薄荷茶尤佳乳香宣經圓治男子婦人體虚氣弱寒濕相搏半身不遂手足麻痺行歩少力骨節煩疼足脛浮腫皮膚不仁脚膝常冷狀若風吹或時作熱漸成脚氣脚膝生瘡痛痒不仁又治肝腎不足經絡留滯筋脈緩弱舉動皆難四肢攣急不可屈伸臂痛游走或左或右風毒攻疰乍差乍發肩背相引腰膝大痛風痺嚲曳血脈不周閃肭打撲内傷筋骨痛不可忍男子疝氣膀胱上下奔衝婦人月水不調多作腹痛常服活血脈止疼痛補虚損壯筋骨樊防禦祕方天台烏藥葳靈仙酒浸京萆薢茴香炒陳皮黒荳煑川練子肉各壹兩半草烏㭍錢剉炒五靈脂半兩乳香半兩别研黒牽牛取粉捌錢右為細末却入乳香拌勻醋糊為圓如梧桐子大每服三十圓温酒下空心食前太一丹治諸風及癱瘓偏風手足頑麻肢節緩弱骨肉疼痛并治頭風偏正頭痛項頸拘急頭旋目運嘔吐痰水或耳鳴聾風痰上盛及療傷風傷寒頭疼不可忍者並宜服之常服消風化痰清頭目利胷膈川芎川烏去皮尖草烏去皮尖白芷白附子黒附子去皮臍細辛去葉洗半夏洗天南星洗天麻右等分並生用細末如藥貳拾兩即入麵貳拾兩白者同拌勻滴水和圓如彈子大日中㬠亁每服壹粒茶酒任嚼下荆芥薄荷茶亦得如傷風傷寒頭目昏疼用生葱白壹莖同嚼熱茶清送下不計時候此藥予家常合用之甚効治麻痺妙方用四味理中湯加防風天麻等分同煎甚佳或去白术加附子尤妙治頭目旋暈吐􅬏盖胃冷生痰致有此疾累用有効止逆湯川亁薑貳兩炮甘草壹兩炙赤色右二味㕮咀為麄末每服四伍錢用水貳盞煎至捌分食前熱服赤茯苓散治隂陽俱虚經絡凝澁氣血不和身體疼痛背膊勞倦手足無力並冝服之赤茯苓去黒皮叄分當歸去苗洗切焙亁叄分木香半兩桂心去麄皮不見火叄分白术壹兩枳殻麩炒去穰半兩赤芍藥壹兩柴胡去苗洗半兩黄耆半兩炙鱉甲醋炙去裙叄分五味子㨂净半兩桔梗剉炒半兩芎藭半兩橘紅半兩甘草半兩炒右拾伍味同為麄散每服肆錢水壹盞半生薑伍片煎至捌分去滓通口服無時治中風涎盛不省人事人參訶子散李武仲傳云得之張魏公家人參訶子青白者炮去核甘草右件各等分為細末每服貳錢白沸湯㸃服如卒中風痰壅不省人事急投此藥神効無比即便省也治中濕癱瘓無異中風聖功散右用五積散壹兩却入細研眞麝香貳錢同煎服更多愈妙李武仲傳云得之李與㡬治風熱上攻頭目昏眩及療偏正頭疼一品圓大香附子去皮毛用水煑一時乆細切焙亁右為細末煉蜜圓如彈子大每服壹圓水壹盞煎至捌分通口服婦人用醋湯煎治丈夫婦人中風氣痺其疾作之初切不可以治風瞑眩之藥與服若大段有涎即略與不損氣者下涎藥才定如手足緩弱不遂即便與此藥服南木香好者壹大分洗剉焙亁為細末右先取好𤓰蔞壹箇取子及穰去皮將子與穰各研極細用無灰酒壹大盞投之攪勻用生絹絞取汁如此研絞叄兩次酒醲無味乃止於銀石器内煎叄兩沸調木香末帶熱服令人按摩病處良乆就病處臥移時自能舉動矣此方乃大溈山和尚所傳大溈云氣行則風行氣逆則風聚甚者不過叄伍服大有神驗治感風中暑和解散治感寒表裏未辨頭痛惡心發熱煩疼不進飲食常服正氣除寒邪辟瘟疫不問老少比日可服黄鼎臣傳蒼术洗淨肆兩厚朴製桔梗去蘆各肆兩藿香葉前胡洗去蘆柴胡洗去蘆當歸洗赤芍藥各貳兩川芎陳皮去穰炒甘草炙神麴炒麥蘖炒赤茯苓各肆兩半夏麴貳兩右麄末每服肆錢水壹盞半薑叄片棗壹箇煎㭍分去滓服不拘時候葱术散不問隂陽二證染患淺深凡時行瘟疫及㝷常風吹雨霎頭目昏重四體熱倦行歩少力骨節疼痛悉皆治之蒼术洗淨壹斤葱連根鬚洗淨壹斤麻黄不去節肆兩甘草貳兩炙右將葱术入臼中杵令葱涎相入盆中堅捺令熱冬間半月春夏五七日取出鍋中炒葱葉過焦逐旋篩出以术乾為度次入麻黄甘草為末每服貳錢水壹盞薑叄片棗壹箇煎㭍分去滓熱服如要出汗連進貳叄服以衣蓋之常服解諸勞倦行路緩急最為先務參苓散解傷寒治百節疼一切虚勞氣疾並宜服之何伯應傳人參貳兩茯苓壹兩白术貳拾兩剉細桔梗拾兩去蘆橘紅陸兩香白芷叄兩芍藥壹兩當歸貳兩去蘆頭川芎壹兩半半夏壹兩湯泡七遍厚朴貳兩去皮生薑汁製官桂去皮春夏叄兩秋冬肆兩枳殻肆兩麩炒令黄同桂樁為末乾薑春夏壹兩半秋冬貳兩麻黄去根節春夏貳兩秋冬叄兩甘草叄兩右件壹拾陸味各淨洗焙乾除芎桂枳殻别杵外諸藥同為麤末分作陸分於大鐵鍋内以文武火炒令微赤黄為度不可令燋須是勻取出以淨紙襯安板床上候冷勿令侵塵土入前枳殻官桂川芎和勻杵為細末每服壹錢水壹盞生薑叄片葱貳寸同煎㭍分通口服不拘時候治感寒傷風鼻塞頭痛及時行瘟疫老幼皆可服之香芎散香附子炒去皮陸兩川芎香白芷甘草炙已上各貳兩藿香葉肆兩石膏研如粉叄兩右同為細末每服壹大錢熱茶調下不計時候傷寒瘟疫差後禁忌龎安常論飲酒合隂陽復病必死生鱠煑麵酒韮蕈鱓􅐜豆粉犬羊肉腸血生菓油肥之類食之皆發熱黄下利不救諸勞動皆致復尚可治女勞多死御愛薑蘇圓治中暑心惡頭疼煩燥生津止渴沈德之樞密傳紫蘇葉㨂淨伍兩烏梅肉切炒貳兩甘草生叄分桂去麄皮半兩香薷葉㨂淨半兩生薑洗切焙亁壹分木𤓰貳兩亁者如生去皮穰切焙檀香半兩剉屑右為末煉蜜為圓如櫻桃大每服壹圓細嚼熟水送下不以時水瓢圓解暑毒除煩燥生津止渇烏梅肉剉炒貳兩甘草壹兩炙乾木瓜壹兩青鹽壹兩研細後入檀香半兩剉屑人參半兩去蘆白茯苓半兩去黒皮麝香半兩研後入右為細末入青鹽麝香拌勻煉蜜為圓每壹兩分作貳拾圓冷水或熟水嚼壹貳圓秦芁散治中暑秦芁去土當歸去蘆桔梗黄連去鬚烏梅去核甘草炙青皮去穰柴胡去蘆乾薑炮芍藥右件等分為細末解暑濃煎燈心湯下心痛煎菖蒲湯下㵼痢米飲下常服熟水下骨熱地骨皮湯下貳錢治中暑甚妙張魏公行軍時常用上等重羅細麵壹味以薑汁及水和成餅子暴乾却碾末収之每用貳叄錢新汲水調服治中暑迷悶欲死右取蒜壹瓣生嚼以新水送下或不能嚼水研灌之立可救熱死人切勿便與冷水及卧冷地正如凍死人須先與冷水若遽近火即死治夏月大熱因飢中暑暈倒昏塞者急煎米飲徐徐灌之候漸省只與大順散及温氣藥服或大燥吐悶亂不止急取本人汗頭巾或頭鬚挼汁壹盞入青黛一錢調灌須臾吐出惡毒涎水定省後以温粥飲投之即愈解暑毒黒散子不蛀皂角不拘多少燒煙絶以盆合秤四兩甘草壹兩炙為末新汲水調下壹錢甚者加壹錢一方只用皂角燒成炭末之用水調甚効蓋中暑人痰塞闗竅皂角能踈利去痰故也神仙截傷寒四季加減百解散夫四時有不常之氣傷人為病外客肌膚腠理摶於榮衛由饑飽勞役損於五臟六腑或由憂愁思慮居處不常非節之氣因兹觸冒病發四百四種變疾於千七百四十五證遂編類成巢氏病源計五十卷又有八方居民所食鄉土風俗氣候異證竒疾不載數内外其間唯難治者傷寒一門非雜病之比五種不同六經各異隂陽傳受日數淺深藥劑温涼用有先後況不識法者乎差之毫釐輕者危殆變證百出無復紀律擾擾萬緒起矣且傷寒一家二百七十五證四百一十五道方書一日太陽二日陽明三日少陽四日太隂五日少隂六日厥隂六日六經俱足隨其輕重以吐汗下和解之始末不出六七日之間當必取差傷寒唯兩感一證不治其餘證候雖感異氣能消息之無不愈者又豈可妄投湯劑耶病是陽證陽實則譫語無可疑者病家未諳多用生牢祈祭神廟妄信邪巫加以符禁親戚杜門絶人徃來問候務在邀永况傷寒六經之病傳受只有六日之期動經旬月悮致夭傷不可勝計豈不痛哉今傳受神仙截傷寒四季加減百解散無問隂陽二證其間所用藥味各隨經絡治病如傷寒在表未傳入經發熱惡寒腰脊强痛連進貳服汗出而愈若已傳經絡胷滿氣逆肢軆煩疼目睛痛耳聾口噪咽乾或渴不渴手足自温或肢厥自利或不自利小便反快連服之則調中順氣祛逐寒邪如首㑹感風風傷腠理頭痛項强表重傷風増寒頭痛鼻流清涕咳嗽涎痰及風濕相摶闗節煩疼一身盡重加之惡風時自汗出此藥大能調順三焦扶表救裏温潤肺經正四時之氣昇降隂陽進美飲食和解發散涼汗清肌退熱固表則止九種自汗不問傷風傷寒中暑中渇食蒸頭痛氣逆胷滿失飢吐逆眩暈及已經汗之不解下之不當吐不中病兼此藥清而不涼温而不壅無問老人虚人大人小兒婦人姙婦亦等宜服專一連進無不取効春常服免瘟疫之疾夏常服不中暑暍秋服無瘧痢之疾冬服不感寒毒眞神仙衛生之妙藥也功効不可盡述李武仲傳云得之洪帥呂殿撰柴胡去蘆頭并土升麻乾葛白芍藥白术防風去苗甘草炙羌活獨活藁本去半夏湯洗㭍次薑汁浸蒼术米泔水浸麩炒人參去蘆藿香去梗已上各修事了秤壹秤立春已後不加減立夏已後壹料加柴胡壹分赤茯苓當歸各半兩立秋已後減柴胡壹分不用當歸赤茯苓各半兩只加麻黄去節半兩亁薑炮官桂各壹分立冬已後並無加減右件同為細末每服叄錢水壹盞半生薑叄大片棗子貳箇煎至壹盞去滓熱服不拘時候併進貳服如要表散加白葱叄寸淡豉叄拾粒煎服衣被盖覆汗出而愈治初感傷寒頭痛發熱小解五毒散李武仲傳云得之王德全二方山茵陳貳兩去根焙麻黄貳兩去根節蒼术貳兩半米泔浸過壹宿切焙石膏半兩火煆右為細末每服貳大錢熱葱茶調下治傷寒疫氣羌活散羌活壹兩洗切焙防風洗切焙牡丹皮洗切焙芎洗切焙當歸去蘆洗切焙甘草微炙伍味各半兩右為剉散每服貳錢水壹盞薑叄片煎至捌分去滓温服不拘時候治叄日傷寒仙授散李武仲傳云得之陳庭藻蒼术肆兩米泔浸壹夕洗淨秤麻黄肆兩去節秤香附子肆兩去皮毛秤杏仁貳兩去皮尖麩炒别研甘草貳兩生用右為細末每服叄錢白湯調下如人行五里間進叄服服訖避風如一服便有汗即不必再進米元暉云此乃呂先生弟子陸先生方醫愈翟伯夀陸弟子元道人傳元暉於三茅山治氣疾及心痛三倍圓療氣不升降結痞木香壹兩炒青橘皮貳兩炒半夏洗肆兩薑汁製右為末薑糊圓如桐子大每服貳叄拾圓米飲下食後兼治因風咳嗽及小兒暴嗽九氣湯治諸般氣疾乆服舒暢經絡香附子炒去毛甘草壹兩炙薑黄壹分甘松壹分山藥半兩木香半錢蓬术壹錢炒縮砂仁半兩右為細末每服貳錢入鹽沸湯㸃服不計時候一方加益智仁壹分治心腹攅痛髙良薑桂等分右為細末糯米飲調下白湯亦得極効御府五辛寛膈湯沈德之樞密𫝊揀丁香檀香桔梗剉炒陳皮去白已上肆味各壹兩縮砂仁炒川乾薑炮甘草炒各叄兩白鹽貳兩半炒别研入右為細末入鹽令勻每服貳錢沸湯㸃下治心疼五靈脂不計多少為末用壹錢以酒醋各壹茶脚許同熬如稠餳别以好酒解調下立愈治心痛將死用乾漆為末每服壹錢入水壹盞煎至半盞次入醋半盞調勻頓服之治一切心痛灸法每盛發時於足心亂紋中以麥粒大艾炷灸叄壯男左女右治一切氣痛延胡索不拘多少每服貳錢熱酒調下甚者不過再服治婦人心疼荔枝核燒灰存性為末温淡醋調下治醋心爛嚼胡桃以乾薑湯下立効或只嚼胡桃或只喫乾薑湯亦可治治心痛良薑不拘多少用木臼杵為末只羅取細末去麄者以乆陳米入酒醋和水煑令爛於沙盆内研成膏取出和前件末再入臼内杵貳叄拾杵為圓桐子大丈夫橘皮生薑湯女人醋湯當歸湯下叄拾圓治脾胃積聚附秦綾錦家二十四味養脾圓治風冷寒濕邪氣腹脹痞滿刺痛腸鳴泄㵼吐􅬏吞酸羸弱困怠無力不思飲食一切脾胃之疾並治之黄子耕傳丁香沈香木香各壹錢半附子陸錢半炮去皮臍秤陳皮去白大腹皮神麴炒各半兩白术大麥蘖炒肉桂去皮不見火各壹兩半厚朴去皮薑製叄兩訶子炮去核壹兩叄錢人參去蘆茯苓各肆錢縮砂仁捌錢蓽澄茄白附子炮髙良薑油炒紅豆去紅皮胡椒炒蓽撥甘草炙川薑炮各貳錢生薑拾肆兩切作片焙亁右為細末煉蜜為圓如彈子大食前細嚼沸湯下扶老强中圓乆服温煖五臟大建脾胃充實肌體安養真氣通和血脈能愈衆疾逐宿食除痰飲散滯積消脹滿破癥結化水糓補中壯氣令人喜食神麴剉碎炒貳拾兩大麥糵炒拾兩呉茱茰洗炒伍兩乾薑炮伍兩右件藥為細末煉蜜圓如梧桐子大每服一百粒不拘時候任湯使下只用白糊圓亦得臨時加減圓數又一方加烏梅肉剉炒伍兩陳皮去白伍兩健脾湯大益脾胃消痰進飲食早出冒冷及酒病尤冝服生薑壹斤洗和皮切入乾磁盆内以鹽肆兩淹一宿日中拌㬠以鹽汁盡為度草豆冦仁焙亁甘草炙陳皮去白神麴炒麥蘖炒勿焦各貳兩右為細末白湯㸃服空心食前助胃膏大壯脾胃及治惡心吐嘔不思飲食泄㵼等疾人參丁香甘草炙白茯苓白术已上各半兩肉豆蔲肆箇麪煨山藥壹兩白豆蔲拾肆箇去皮木香貳錢縮砂貳拾肆箇去皮右為細末煉蜜圓彈子大食前白湯下小兒尤宜服法製檳榔治酒食過度胷膈膨滿口吐清水一切積滯洪子和𫝊鷄心㯽榔壹兩切作細塊白豆蔲取仁壹兩縮砂取仁壹兩揀丁香壹兩切作細條粉草壹兩切作細塊生薑半斤切作細條鹽貳兩眞陳橘皮半斤去白切作細條右件同河水兩碗浸一宿次日用慢火砂鍋内煑亁焙亁入新瓶収每服一撮細嚼酒下為細末湯㸃亦可延年草邢和璞眞人常服安神導氣消酒食益脾胃老人小兒皆可服昭陵每食後嚼數片神安軆健賜吕申公劉斯立秘之名延年草昭陵亦賜魏公廖提刑蘧傳青皮一斤湯浸三日各三換候苦味去盡然後去穰切作指面大方片子甘草六兩剉秤炙上等白鹽花五兩再淋煎用須要雪白新舶上茴香四兩右用甜水一㪷同藥入銀鍋内熬不住手攪勿令着底置密器中収不得走氣候水盡取出熳火炒令乾不得有焦氣選勤謹者一人專一掌之去甘草茴香不用只収貯青皮如傷生冷及果實蔬菜之類即嚼數片氣通即無恙常服一兩片極佳以其尤宜老人邢和璞所以名萬年草斯立又以延年草目之也治膨脹飲食不消至晚不欲飲食洪子和傳用橘皮煎圓叄拾圓感應圓㭍圓煎紫蘇橘皮湯下厚朴煎圓孫兆嘗云補腎不如補脾脾胃氣壯則能飲食飲食既進能主榮衛榮衛既旺滋養骨髓保精益血是以素問云精不足補之以味形不足補之以氣具方于後梓州厚朴半斤去皮了秤剉作大指靣大却用生薑半斤同水伍升於銀器内煑水盡却去生薑不用將厚朴焙乾川薑肆兩剉作指靣大用甘草肆兩槌碎用水壹㪷銀器内煑水盡去甘草焙亁川薑舶上茴香貳兩炒附子貳兩炮製去皮尖臍川椒壹兩去子炒用瓦出汗右件厚朴等為細末煑棗肉為劑如棗肉不合却用麵清糊少許入臼内杵千百下圓如桐子大每服五六十圓空心米湯下此藥温中降氣化痰進食極有逺効大丁香煑散治脾臟伏冷胃脘受寒胷膈痞悶心腹刺痛痰逆惡心寒嗽中滿臟腑虗滑飲食減少畨胃吐􅬏四肢逆冷但是沉寒痼冷無問乆新功効不可具述丁香黒附子炮去皮臍秤亁薑炮良薑剉益智子去皮青皮去白陳皮去白甘草炙已上八味修事了各一兩胡椒半兩右搗為細末不羅拌勻每服二錢水一盞生薑三片鹽一捻同煎七分食前空心服滓再用水煎日三兩服病退即止聚香羊肉圓治脾元乆虚胷鬲噎塞嘔􅬏惡心痰逆腹肚疼痛臟腑洩㵼兩脇脹悶腹内虚鳴飲食不進面無顔色漸成虚羸精神不爽四肢乏力口苦舌亁老人乆不思食尤宜服之南雄韋守能千傳木香濕紙褁微炮剉半兩丁香去梗半兩不見火白豆蔲去殻半兩紅豆炒半兩肉豆蔲濕紙褁炮剉碎半兩胡椒炒半兩附子炮烈沸湯