body:
  text: 傳信適用方卷下治癰疽瘡癤張元輔方一宗陸道地黃圓常服令人終身不患發背熟乾地黃伍兩蓯蓉酒浸天門冬石斛當歸防風白茯苓川芎各叁兩逺志黃蓍甘草炙芍藥各貳兩人參細辛巴㦸各壹兩右為細末煉蜜圓如梧桐子大每服叄拾圓荆芥湯下萬靈圓治發背腫痛裏托定疼𦍑活薄荷葉各叁兩川芎𤣥參地榆麻黃去節防風天麻呉白芷白彊蠶牛旁子炒蔓荆子旋覆花荆芥穗各貳兩甘菊叁兩何首烏肆兩大川烏生肆兩甘草肆兩半炙蟬退去足半兩右細末煉蜜為圓彈子大細嚼壹彈茶酒送下没藥圓治發背活經絡生肌肉大川烏生當歸赤芍藥蘇木剉炒木鱉仁五靈脂炒𦍑活獨活穿山甲蛤粉炒脆各貳兩没藥乳香别研各壹兩右細末酒煑麵糊為圓如梧桐子大温酒下叄拾圎凉血護肌膏南星生末捌兩雄黃壹兩别研白礬生末肆兩右細勻用生地黃汁調塗四圍萬靈膏用淨鐺壹隻下清油捌兩婦人油髪壹兩炭火􅆈令焦盡下側栢枝壹兩歴青壹兩卷栢壹兩太平白芷壹兩當歸壹兩木鱉肉切片壹兩松枝香壹兩熬令紫用楊栁枝不住手攪焦即剉頭熬前藥紫色以綿兩重濾去滓再熬油滚下白膠香壹兩次下没藥壹兩次下乳香壹兩並逐旋半錢徐下次下黃丹壹兩剪刀草末壹兩慢火熬為膏滴成珠子就也用新汲井水浸去火毒先以葱鹽湯洗瘡次用軟帛火炙攤上不得留孔貼之剪刀草乃田中野茨菰也羚羊角散内消發背穿山甲肆兩蛤粉炒脆甘草炙當歸各貳兩右為細末炮甘草根浸酒調下貳錢𤓰蔞散内消惡肉生好肉黃蓍肆兩剉皂角刺捌兩紅者拍碎剉甘草陸兩牛膝貳兩黃𤓰蔞拾箇剉右用蜜壹斤旋入鐺内炒至紫色見風吹脆為末有滓再炒為末酒調下貳錢右方七道里人張元輔用之如神由此致富然秘藏此方人莫傳者余少時目擊其事後凡叄拾年始得之於章明叔蓋其徒云拙庵老人題李温如方一宗六道李温如八行家寳祕療發背藥方不以傳人其子秉彛客於新呉大姓羅氏一日出謁偶忘封鏁書篋為諸生竊取其方錄之秉彛歸為之出涕蓋其父子以此方救人之死甚多深不欲傳也其用藥次第如後初覺閻發時先服通關散門氏載此藥治發背内潰及諸惡毒衝心嘔逆見信效方菉豆末貳錢乳香末壹錢右貳味和勻井花水調服微利為妙次用藥試發瘡可治不可治白礬壹兩天南星壹箇右為末以冷水和勻傅腫處留出瘡口仍以筆畫泥瘡暈若藥力勝則腫消皮皺此為易治若腫處皮急暈開即難治次服赤小豆右用赤小豆半升不去皮生為末每用壹兩匙以冷水調下連併服盡如未退再服半升取口鼻大便出血為度服豆末時不可喫飯次服四味散石上薜荔貳兩地榆壹兩甘草節壹兩當歸壹兩右為末温酒調下叄錢次服膨脝葉叄斤岡穀刺葉壹斤右貳味旋採勿令婦人鷄犬見碓臼内春爛每用壹碗許以酒壹盞浸去滓温服仍以藥滓􅛇瘡次用歛瘡口生肌散木香檳榔黄連洗去鬚右叄味等分淨器碾羅為末時以傅瘡若瘡潰爛傅了更以常用膏藥或雲母膏貼定聴膿水自出若用此藥傅後瘡口未便歛白及末輕粉各少許勻傅即有速效門資欽錄元立方一宗四道壽州霍丘醫瘡人元立治瘡甚有聲元符己夘予侍先子將漕江東舟次壽州予因累日食鷄卵數十枚暴得咽喉腫塞及頸赤腫硬下連心胷如鐵石日夕號呌喉中水米不通壅塞將死召醫者視之云此喉癰也泛泛藥恐無益因言可招元立治之必愈先子夜遣介兩日徃還數百里召立至用藥數服得効報之頗厚立感激予自傳治發背方四首皆累用有竒功今錄于下治發背腦疽一切惡瘡當先用托裏藥使毒氣皆出一醉膏凡初覺發背癰疽等即多服用大黃甘草等藥極踈轉以行道毒氣次用此藥大甘草半兩為麄末没藥壹分研苽蔞壹箇大者去皮右叄物用無灰酒叄升􅆈至壹升放温頓服之如壹服不盡分叄兩服連服盡次用收暈白玉膏切忌用冷藥外貼必逼毒氣入内殺人杏仁貳拾壹粒去皮尖研川椒肆拾玖粒去目為末清脂麻油壹兩酒臘半兩白者右同􅆈至紫黒新綿濾過用無灰薄紙㸔瘡大小剪作梳様攤藥在上於瘡暈盡處向兩邊圍遶貼之候暈漸收近裏即别剪差小者再攤藥圍貼暈又收即又再移近裏貼仍頻換候暈已收見瘡根脚或瘡口即用次方專貼大惡瘡毒氣方盛不可以藥當上貼恐趕散毒氣瘡益大此藥能收暈見瘡其法大妙暈收見瘡次用檳榔散鷄心檳榔半兩川黃連去鬚半兩川山甲大者拾片燒灰存性右同為細末先用好臘茶清掃過瘡用藥厚傅瘡上日叄伍次以膿出為知如見瘡口後用此藥數次了可更用乳香膏膿已出用生肌藥黄狗腦盖骨貳兩燒灰存性此極難得須預收膩粉壹錢桑白皮末壹兩右同為細末用生油調塗瘡上以上四方是一宗元立自云少年時初得此方救十餘人後忽自病背瘡自信其藥乃以此四藥自治得愈袒背示予瘢㾗猶盈尺也予在汝州時梁縣吏人侯昱孝母病背瘡予用此治之愈泰山石刻一宗七道專治發背方神妙不可具言右初覺或做瘡用牛皮膠􅆈令稀稠得所如藥花攤在毛頭紙上於初覺處或有做瘡處貼次用軟布帕子貳條於釅米醋内煑令熱漉出互相於膠紙上乗熱蒸熨不可令布帕冷布帕貳條不可都齊漉出常留壹條在醋内煑候蒸熨得壹條冷却於醋内取熱布蒸熨冷布却入効醋内煑庶幾常得熱布替換熨蒸即易見若瘡痒時乃是藥攻其病須忍痒不住蒸熨直候膿出將盡即濃煎貫衆湯候温洗去膠紙次日後㸔瘡中尚有膿出即是未効却再如前將膠紙鋪於瘡上用熱醋布依舊蒸熨追令膿盡然後却用貫衆煎湯如前洗去膠紙次日後依前更㸔若尚有膿又如前法蒸熨雖連數日蒸熨不妨但要瘡中膿盡瘡成乾揜為度然後用生肌紅玉散摻在瘡上即以萬金膏貼每日壹上或兩上專治諸般惡瘡萬金膏黃連黃栢黃芩白及白斂龍骨當歸厚朴川芎没藥槐枝栁枝鱉甲苦參香白芷木鱉子草烏頭猪牙皂角烏賊魚骨已上各壹分乳香壹錢黃丹壹兩半清麻油肆兩冬月用半斤右件藥除下黃丹將諸藥油内慢火煎得油色紫赤濾去藥材不用入黃丹在油内先用黃丹一半於油内不住手攪􅋩得色似黒更入壹半黃丹不住手攪只是用慢火􅆈得紫色滴在水上不散捻不粘手然後更入黃丹少許再熬如捻着硬時却更入油少許但不粘手是成也如常膏藥攤在紙花上㸔瘡大小敷貼治熱毒腫硬難消者瘡腫白鶴散寒水石軟者貳兩燒不爆散者乃是寒水石燒爆烈散者即是石膏不可用右用炭火燒寒水石通赤細研冷水調少許在瘡高處後用萬金膏貼毎日一上用此藥後便軟做瘡頭兒更用七聖散掃膏藥周回腫處藥乾即更掃回瘡化惡肉止痛生肌麝香散寒水石叄兩用炭火燒通赤入膩粉半錢麝香壹字同研右如瘡口内有紫惡肉時更乾摻少許在惡肉處後用萬金膏貼每日一上如瘡内膿多每日兩上治疳瘡發背麝香圓麝香半錢輕粉半錢定粉半錢粉霜壹字半巴豆叄箇大好者去皮研白丁香肆拾貳箇揀直者右先研粉霜麝香且裹起令研巴豆細却合諸藥更同研極細為度如疳瘡深有眼子用水和作挺子任在瘡口内後用萬金膏貼毎日一上如膿多兩上如患惡瘡發背魚眼丁瘡有紫惡肉只做散子乾散在惡肉上後用萬金膏貼每日一上或再上且少摻藥如不痛更加此藥生肌止痛合瘡口生好肉時用此紅玉散寒水石貳兩炭火燒通赤候冷即細研黃丹半兩右貳味同研細乾摻在瘡内後用萬金膏貼每日一上或兩上消熱毒赤腫疼痛不可忍七聖散黃芩壹兩去黒皮并心大黃壹分白滑石肆兩右為末用冷水調掃腫赤疼處如乾即更掃右瘡藥方一宗士大夫家多有之括蒼何氏始編刻于經驗方或云此方舊有以刻之太山石壁者周子明提㸃傳一宗八道治五發發腦發鬢發眉發頥發背癰疽瘭痼癌一宗藥保不死方才覺寒熱瘡已現發渇即是其證先用車螯散紫背大車螯壹名車娥也毎箇用草先札定上用鹽泥固濟日乾簇火煅之候通紅半時辰許離火候泠手取敲去泥以器皿合在淨地上出火毒半日許令碾羅為細末沙合收甘草炙碾為末輕粉右每服抄車螯貳錢末甘草末壹錢輕粉末半錢温麥門冬熟水調下五更初服至日出時候大便不痛下青綠苔或如黒煤惡物下也次用一生黃土細研末半錢許入蒜叄瓣細爛搗捉薄作叄餅子不拘大小坐於瘡頭上用伏道熟艾炙之百壯少歇與飲食喫再炙之叄伍拾壯也每艾炷伍拾枚換餅子壹箇次用六一湯托藥眞綿黃􅂄箭簳者是也木耆不堪誤人秤陸兩以刀擗開揭薄用白沙蜜不酸者壹兩微入水少許調解則易塗蘸候搓勻灸之微紫色候冷剉碎不碾羅橫紋甘草炙壹兩細剉右拌勻毎服抄伍錢水壹盞煎至㭍分服之日叄服夜貳服次服苽蔞湯苽蔞壹箇去皮將穰與子剉碎没藥壹分研甘草半兩生剉右叄味用無灰酒叄升煎至壹升分叄服温餌次用治癰疽等腫壞消毒去惡肉猪蹄湯香白芷甘草獨活露蜂房黃芩赤芍藥當歸右先將獖猪前蹄兩隻只用白水煑軟將汁分兩次澄清去上面油花下面滓肉毎用藥半兩投於汁中再煎伍㭍沸濾去滓以故帛蘸藥湯中薄揩瘡上死肉惡血随洗而下以乾故帛拭乾輕竅减痛仍避風忌人口氣吹之有胡臭人不得入宅猫犬亦忌月候人不令入房次用洗藥散風邪生好肉芎藭剉白蒺藜子搗去尖防風剉右等分為細末每用抄壹匙頭煎令沸氣上對瘡候通手以帕子揩洗之前藥壹次換後藥兩次易貳藥相間洗凢瘡破有頭便用洗藥洗訖便用薄貼傅之薄貼謂膏藥也太上無比靈應神異膏露蜂房壹兩剉碎虵蛻皮半兩細剪𤣥參半兩細剉真綿黃耆叄分細剉眞杏仁壹兩去皮尖畧搗破黃丹伍兩虢州者佳童兒童女亂髪淨洗日乾如鷄子大右先用真麻油不用菜子油壹斤入鐺便下髪慢火􅆈候髪消盡次入杏仁濾去滓再入鐺入餘藥􅆈候焦黃再濾去滓次入黃丹候變色以新栁木箆子攪伍千攪滴入水中㸔軟硬得所然後傾淨甆罐子如尚未硬更攪叄百攪也攤用如常日換兩次夜換壹次疽發人貼雲母膏痛如刀割不可不審不可不知也亦不得用生肌藥只貼膏藥自然歛合如醫治後時為庸醫藥罨或刀割傷風重者兼以五香連翹湯木香麝香乳香沈香藿香連翹右等分為細末毎服貳錢水壹盞煎至㭍分放温服無時瘡四邊以金箔先用津液次㸃之也乳香膏治諸惡瘡丹腫能收瘡根聚膿止痛没藥壹分細研通明乳香壹分水外浸乳鉢細研眞麝香半錢别研膩粉壹分黃臈貳錢萆麻子壹兩右陸件同研極勻為膏用無灰薄紙攤藥貼上留眼子出膿日叄肆次換本在元立一宗方後化毒排膿内補十味散治一切癰疽瘡癤未成者速散已成者速潰敗膿自出不犯刀仗服藥後疼痛頓減此其常試之効也如妳癰腸癰及其它腫毒皆嘗治愈此方歙縣丞胡權得之於異人徽州有石刻及洪景盧夷堅志所載甚詳兹不復錄人參去蘆當歸酒浸芎窮防風厚朴製桔梗白芷桂去麄皮不見火甘草炒黃耆蜜浸一方加黄苽蔞壹兩去皮秤右拾味選藥貴精皆取淨曬焙極燥方秤人參當歸黃耆各貳兩餘各壹兩為細末毎服自叄錢加至陸錢熱酒調下日夜連進數服以多為妙至瘡口合更服為佳所以補前損絶後患也不能飲者間以木香湯調服但不若酒力之勝耳治發背已發未結成已結成未潰用牛皮膠貳兩酒貳升生甘草壹寸同煮候牛皮膠溶化放温令病者徐徐飲盡如未結成即消已結成則易潰已潰則易差如未効再用必効治發背癰疽一切毒瘡臘月乾桑葉右不拘多少碾為細末以新汲水調塗瘡上如瘡有膿血即乾摻用之如瘡在脚膝間傅藥了用帛子裹之神効不可具言撮軟癤覆盆子葉微炒油調紙花貼又方五倍子炒焦油調如上用治瘡疥丹毒一切雜瘡魏伯虎瘡藥方内經云諸痛痒瘡皆屬於心心受風熱則血脈凝滯而成瘡風多熱少即痒熱多風少即痛風熱相半即痒痛皆因大病後風熱毒不曽宣利畜於血脈遍身生惡瘡兩腿尤甚或攻刺疼痛或晚間増寒欲作膿水毎蓋即熱痛不蓋即疼痛宜服此藥烏蛇壹條大而細尾梢長者去頭尾叄寸長截作數劑用極好酒浸叄宿去刺骨皮取好淨肉慢火焙乾𤣥參去蘆頭苦參去木取皮地骨皮去木淨洗白蒺藜炒以新塼貳口磨去刺甘草細切炒令黃色防風去蘆淨洗白殭蠶炒斷絲乾蝎以米炒令米微黃為度川芎淨洗已上各半兩草烏半斤肉白者以黒豆壹升水煮令草烏都黒惟心中壹㸃白為度薄切焙壹兩黒牽牛半生半炒以貳兩取壹兩末枳殻去穰薄切麩炒壹兩右件壹拾叁味為細末煉蜜搜成劑入石臼中搗百十下圓如梧桐子大每服貳拾至叄拾圓温酒吞下不拘時候日進叄服以利則減不利則加服又方柿樹皮燒煙欲盡以椀盖滅火研壹兩荷葉如前法燒灰取壹兩草烏去皮尖半兩硫黃半兩黃連半兩去鬚黃蘖半兩去麄皮胡椒半兩白蕪荑半兩研細辛半兩苦參半兩白礬生研叄錢雄黃細研半兩輕粉壹錢右件壹拾叄味搗為細末和令勻濕瘡乾摻乾瘡用烏臼油或酥或油臘調塗夜間以手掌多擦藥有痒處即以手掌拂之治熱毒風瘡四聖圓與國侯醫恭傳四方何首烏壹兩蔓荆子壹兩苦參壹兩荆芥穗壹兩右件肆味生為細末用酒糊為圓如梧桐子大毎服貳拾圓至叄拾圎温酒送下貼瘡烏金散用鯽魚壹箇可重陸兩者去腸用栢葉碾細入在魚腹内用紙褁數重次用黃泥固濟煅令存性候冷碾成細末入輕粉壹分同勻如瘡乾用麻油調瘡濕乾用又方撫芎不拘多少煅過入輕粉用麻油調塗如瘡濕乾摻洗瘡苦參荆芥防風露蜂房木鱉子白殭蠶五倍子地骨皮桑白皮右件各等分煎洗瘡處治膁瘡累年不効鯽魚壹枚用麻油煎魚焦為度去魚只留油調藥穿山甲不拘多少鹽泥固濟候乾火煅存性為末入輕粉麝香少許研勻先以鹽湯洗瘡却用前件油調藥塗之治漆瘡芸臺葉或用子搗汁塗又方用臘茶調麻油塗治一切惡癬并瘡用茄子花為末乾用油調塗濕乾摻之癮􅇙入腹亦殺人蠶沙貳盞水貳盞煮壹椀洗又鹽湯洗了以蓼子挼傅之又枳殻剉煎湯洗又牛膝末酒調貳叄錢服又蕪菁子末酒調服治一切丹毒川芒消細研為末以水調塗生地黃擣汁塗五葉草爛擣傅或為末以水調塗浮萍草爛擣傅芭蕉根擣自然汁塗竈中黃土以水調塗川大黃擣羅為末以水調塗皆可擇而用之治夏月抓破皮膚成瘡胡桃壹箇燒灰入蛤粉白礬少許右研細油調塗治癬妙方川烏香白芷蟬蛻已上各半兩全蝎壹分右肆味為細末用羊蹄根自然汁煉蜜為圓如梧桐子大每服貳拾圎先安排熱酒壹盞去浴堂内解缷衣服了以羊蹄根壹枝取自然汁滴在盞内嚥下藥便用熱湯澡洗却用羊蹄根代皂角擦之出浴令汗乾便不見癬治疥癆但季良傳猪膏煉油石灰細羅貳味以意度多少一處銚内炒以乾為度先鋪紙在地却傾所煉猪膏石灰於其上用盆葢之出火毒壹夜研為末乾擦治小兒浸淫瘡周元亨傳韶粉蛤粉等分輕粉少許右研勻以臘月猪脂調塗治夏月疿子􅀥葉乾為末和葛粉裛之亦治熱瘤又方兼治汗漬腋下赤腫霜和蛤粉傅之立差冬月瓦木上以雞羽掃取收甆瓶中或只用雪水亦佳又一方加滑石菉豆粉同和勻無雪水則用新汲水調塗或日乾撲之治瘰癧已破者羯羊糞焙乾為末用油調塗如瘡濕止乾摻治傷折金瘡破傷風治打撲傷損接骨如神方桂漢士傳川烏草烏白薑半夏南星桂去麄皮右各等分為末取生薑自然汁并釅醋各半調上件藥稀稠得所就綿上攤勻褁痛處如乾再將醋并薑汁潤如藥落再換或傷折甚者用藥了以杉木片子夾定此藥用後止疼然後服藥服藥當歸去蘆焙乾秤乳香細研右等分為末每服貳叁錢酒調下應痛散治身體偏疼兼無力宣通經絡使血氣和暢延胡索炒當歸去蘆桂心去皮取肉各等分右揀好藥材為細末以酒調下不拘時每服叄錢或肆伍錢量病痛如何用藥多少頻進􅀢酒亦隨人量以知為度尋常閃着筋力挫氣疼痛壹服即効治刀斧所傷打撲傷損大能止血生肌定痛用好降眞香不拘多少碾為細末臨用時量大小貼瘡口乾摻便乾不疼如神亦不作膿水兼治發背惡瘡等疾洗去膿水乾貼降真須用結實色深者打撲傷損姜帥傳牡礪火煅數次為細末濃煎蘇木酒調下肆伍錢如傷損上軆則食後服傷損在下則食前服李武仲云只以䧏真用無灰酒濃煎服極妙應被傷折皆宜用之治破傷風黃明膠燒存性調貳錢以好酒調之治破傷風身體浮腫甚者口噤舌強狀如中風獨聖散用魚鰾燒過存性不拘多少細研每服貳錢濃煎蘇木酒調下兩服立効魚鰾乃木匠用作膠者倉卒無蘇木只以温酒調亦可入少麝香尤妙治刀斧湯火所傷蛇蝎大鼠所咬疥癬等瘡備急百靈膏右於五月五日絶早出門望東去採百草不拘多少惟不得回顧採取滿意方回入杵臼内爛搗如泥量藥多少以意入石灰和勻取出拍成膏日中暴乾遇要用時旋取撚碎如法用刀斧傷乾傅取血止為度湯火傷冷水調開塗傅蛇蝎犬鼠咬傷先以温水洗以津液調傅疥瘡先爪損以藥末乾傅乾濕癬以醋調傅之其効如神破傷風瘡口作白痂無血者殺人最急治之方雄雀糞直者是研細熱酒調半錢服破傷風牙關緊噤草烏頭去皮防風為末雄黃别研等分毎服壹字熱酒調灌之亦治洗頭風噤了牙關者如破傷風身體強硬更用天南星貳兩防風壹兩為末先以熱小便洗瘡