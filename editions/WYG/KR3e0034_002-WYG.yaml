米飲下不計時候日貳叄服姑熟李氏小兒保生要方三卷其論議治療之法甚詳審兼有錢氏所未及言者予家常用之無不取効今摭其間論證及八方附見於此常用朱砂膏安神鎭驚心去痰退熱人參茯神防風山藥甘草炙黃耆蜜炙麥門冬去心已上各半兩朱砂陸錢研麝香半字右為細末研勻煉蜜圎如櫻株大金箔為衣毎服半粒或壹粒薄荷湯化下不拘時歡喜散治小兒感外風發熱頭痛無汗惡風或眥小温熱鼻塞清涕淚出􅅉噴並皆治之防風人參甘草炙天麻前胡已上各貳錢半細辛壹錢半柴胡壹錢半白茯苓貳錢桔梗貳錢枳殻去白麥麩炒秤貳錢半川芎叄錢右為細末每服叄嵗已上抄壹錢匕水陸分盞薄荷兩葉同煎叄兩沸通口服不拘時更量力加減惺惺散治小兒時行温壯及傷風發熱應表證未解者悉主之亦見和劑方桔梗細辛人參甘草炙白茯苓苽蔞根白术各等分右為細末毎服壹錢匕用水壹小盞入蔢荷叄葉同煎至肆分温服不拘時六神散治小兒胃氣不和表裏俱虚臟腑冷㵼不欲飲食及治因身熱服藥既表解後再發熱者蓋氣不歸元而陽浮於外故耳此非熱證也當此用藥加粳米煎和其胃氣歸内身體自涼如治胃冷及冷㵼即加附子治風證加天麻治痢加甖粟殻同煎服之人參白茯苓乾山藥白术白匾豆甘草炙右陸味等分為細末每服壹大錢水半盞􅀥壹箇生薑貳片同煎至叄分通口服小兒青糞者冷也亦是肝尅脾之證也肝屬木其色青脾屬土其色黃糞黃者脾家之本色也若脾受肝尅則其糞青肝木主風宜早治之不爾成脾風發癎也然所謂青糞􅅻下便青若初下時黃良乆乃青小兒安樂者皆然不可認為青糞也可服白附子圎𦍑活膏白附子圎治小兒青糞及吐而有冷證多者白附子壹分為末蠍梢壹分為末舶上硫黃半兩細研半夏半兩生為細末用生薑自然汁和成劑拍作小錢大餅子沸湯内下候煑熟不麻人爲度取起研成膠右將前叄味壹處研勻入在半夏膠内和得所乾即添湯圎如蘿蔔子大毎服叄伍拾粒米湯或乳汁下𦍑活膏治小兒胃虚吐㵼生風𦍑活天麻防風各半兩人參全蝎酒炒桂各壹分朱砂壹錢研水銀壹錢硫黃壹錢已上貳味同研如泥右先將捌味為細末入水銀硫黃研勻煉蜜為膏每服壹匙匙大用荆芥薄荷湯化下食前服更量度加減小兒暑月多吐㵼其證不一冝詳審用藥不可差謬有伏暑吐㵼者小水必不利宜服五苓散香薷散有傷食吐㵼者其吐及糞皆有酸臭氣宜服感應圎三方易知今不復載㵼多日口唇白及糞色亦白及㵼糞頗多者因而成冷也宜以前方六神散每貳錢匕加附子末壹錢匕煎作叄肆服以防變癎也若肚大㵼色白者疳㵼也宜服官局六神圎㵼者不可急以熱藥止之若以熱藥止之便變成痢凡病痢者皆因有積赤痢熱積也白痢冷積也赤白痢冷熱不調積也赤多白少者熱多而冷少也白多赤少者冷多而熱少也治赤白痢御米飲子嬰粟殻半兩人參壹分厚朴壹兩去麄皮剉薑汁燒熟白茯苓半兩乾薑壹分炮烏梅叄箇連核用甘草半兩炙右為麄末每用伍錢匕水壹盞半生薑叄片􅀥壹箇同煎至壹盞去滓温服量兒大小分作服數若赤多者加黒豆叄拾粒同煎治小兒吐㵼初定當服醒脾散天南星沸湯浸洗㭍遍右壹味為細末壹嵗兒每服半錢匕以河水㭍分盞冬𤓰子㭍粒同煎至貳分温服不拘時候治湯火蟲蛇所傷骨鯁竹刺等治湯火傷段邦政傳用紫桑椹子搗爛收之以塗傷處如藥乾入臈月水浸之一方云桑椹黒者盛瓶罐中自化取汁塗之又方芭蕉水鷄翎掃之又以柿膠鷄翎掃之乃柿油也又豆醬塗之又只以好酒浸洗傷處良久痛止凡湯火傷方出多門如醋磨大黃等方試輙不驗此方有自頂至踵為熱油所中者急以治之随手無纎悉所苦其間有一㸃如星許偶塗傅不到輙起紅泡糜爛經月不差以此知此方神効也用鎔金銀甘鍋子唯是出火次數多者為上才被傷即以冷水急於石上磨汁重重塗傅不見赤㾗即止次日任其自乾脫剝是驗凢被火傷急向火炙雖極痛強忍一食頃即不痛勿以冷物榻之熱氣不出爛人筋也治毒蛇咬人至死只用香白芷壹味為細末濃煎麥門冬湯調叄錢温服之如氣未絶無有不活者若所傷不多只以辣母藤挼傅之又方以酒調雄黃末傅之皆効急切未有麥門冬白湯亦可蛇蝎蜈蚣等傷生鐵石上水磨汁塗蛇傷呉茱茰為末酒調服壹盞油調半錢塗瘡上又搗地榆汁飲并塗瘡又搗小蒜汁飲滓傅瘡又死蜈蚣燒末唾調塗瘡治蜈蚣咬以蜒蚰壹條塗咬處痛立止又方以雞冠血塗之亦効治蜈蚣咬傷痛者急爛研巴豆肉壹粒胭脂膏子少許調勻塗之立愈治小兒百䖝入耳用桃葉塞耳立愈治蜒蚰入耳桃葉絞汁滴入患人耳内不一茶時愈治百蟲入耳以雞冠血滴入耳内即出又方以燈草蘸麻油入耳中釣出治蜈蚣蜒蚰入耳並以米醋滴之即出百蟲入耳以好酒少許灌耳中起行又閉氣令人以筆管吹一耳又車釭脂傅耳孔四邊自出蜈蚣入耳樹葉裹鹽炙熱以掩其耳又炙猪肉令香掩耳即出蟻入耳炙猪脂香物安在耳孔邊即出治諸獸傷馬咬用獨顆栗子燒灰貼鼠咬用麝香唾調塗猫咬用薄荷汁塗狗咬傷涎入瘡令人昬悶者浸椒水調草末塗猪咬松脂溶作餅子貼又屋霤中泥塗治驢涎馬汗入瘡逺志去心為末用酒調塗又頭垢和壁土貼又烏梅肉白梅肉黃丹等分為末以唾調塗又飲淡豉汁壹碗又乾冬𤓰燒灰淨洗瘡口擦藥在内治惡犬咬人以地榆為末傅咬處立差又方以乾薑末傅之亦妙治曲蚓吹用老茶研末調塗之立差治蜘蛛瘡木韮根新者同雌黃研塗之治蜂螫蟢咬以芋頭上汁塗之立差薄荷塗之亦効又方頭垢唾擦亦治蝎螫又蒼耳挼汁塗之亦効治驢馬汗入人肌肉用驢子鬃燒灰挑破所入汗處見血用燒者灰生麻油調塗之治竹木之類物鯁喉中貫衆杵末煎湯呷立下治小兒誤吞錢用炭燒通紅急𢷬為末米飲調下亦治誤吞針釘等物連進數服乃驗又方濃煎艾湯一二盞又餳頓服半斤治魚骨鯁只取大栗殻燒為細末熟水調下誤吞針釘叫子魚骨雜物多食肥羊脂肉及諸肥肉必自裹出治湯火燒用栢葉爛搗傅之治大人小兒魚骨刺在喉中不下痛楚者用舊魚網壹小片燒成灰研細煎乳香湯調下温服甚者併叄兩服孫真人云見一切毒螫之物不得起惡心向之亦不得殺若輒殺之後必遭螫治亦難差治犬咬止痛不作腫嚼杏仁塗効一方先以油洗傷處却以炒杏仁末傅解諸毒救危死解毒藥白殭蠶身直者火上焙黃色放地少時於臼中搗為末每服壹錢用酒醋水叄般同為壹盞煎至㭍分温服可者吐出甚者下之治中一切藥毒淡豉葱麥門冬各壹握水壹椀煎壹盞服解五毒救命散凡出毒者先嚼白礬壹塊味如蜜乃中毒也用白礬壹匙建茶貳匙為末新水半椀調不過兩服良久惡心吐出効解百藥毒出了蠶子者蠶紙燒灰研細每服壹錢冷水調下頻服取差雖面青脈絶腹脹吐血服之立活亦治牛馬誤喫花蜘蛛脹欲死者每用兩大匙水調灌之下喉必効解諸食毒生韮汁服壹貳盞又頭垢如􅀥核大吞之酒毒遍身黃腫者五靈脂壹兩為末入麝少許研勻飯圎小豆大毎服拾圎米飲下解諸藥毒以黒豆煑令熟多飲其汁無黒豆䜴亦可用之解諸藥毒白藊豆不拘多少為細末用水或温湯調下嘗有人以此解砒毒神効亦能解鴆毒解百毒甘草能解百毒為衆藥之長孫思邈論云有人中烏頭巴豆毒甘草入腹即定方稱大豆解百藥毒嘗試之不効乃加甘草為甘豆湯其驗更速凡欲食先取甘草壹寸炙熟嚼咽汁若中毒隨即吐出治飲酒中毒右煑大黒豆壹升取汁貳叄升服之立吐立愈救療急難五絶方五絶一曰自縊二曰牆壁壓三曰溺水四曰魘魅五曰難産凢五絶皆用右用半夏壹兩為末細篩以水搜和為圎如荳粒大毎用壹粒置鼻中立活雖經壹日而心温者亦可救凢中熱死不可便與冷物多死救之方取道中熱土多積心下又衆人嘘其心令暖又取屋上熱瓦熨心下又令病人仰卧以熱土壅臍上令人尿之臍中温即愈土冷别換又方右用地黃汁壹盞温熱灌之又乾薑橘皮甘草煎湯少少與之暑月逺行嘗喫少麻籸即不中暑嚼少生葱解熱渴治落水死方右掘地作坑以熱灰數斗置坑中令死人覆卧其上濕透灰又易之半日即活灰亦不可太熱冷即更易為妙治夏月行路暍死方右不得置死人在䕃涼處及不得冷水灌唯得置日中或令近火以熱湯灌之即活凢自縊死從早至夜雖已冷必可治從夜至早稍難若心下温壹日已上猶可救欵欵抱解不得截䋲放卧令壹人踏其兩肩以手拔其髪常令𦂳壹人以手擦胷上散動之壹人摩搦臂足屈伸之若已僵但漸漸強屈之及按其腹如此壹飯久即氣從口出得呼吸眼開勿苦勞動可以少官桂湯及粥清與之令潤喉咽更令兩人以筆管吹其耳中尤好若依此救無不得活又方緊用手罨其口勿令透氣兩時許氣急即活又皂角細辛等分為末如大豆許吹兩鼻中治溺水死者灸法急解本人衣服臍中灸百壯或倒懸病人挑去臍中垢或吹兩耳中或綿包皂角末内下部外臺云雖溺死壹宿者以皂角綿褁内下部須臾出水即活又方屈死人兩脚着人肩上以死人背貼生人背檐走吐出水即活又􅆈熱沙覆死人面上下着沙只留出口鼻耳沙冷濕換之又倒懸以好酒半盞灌鼻中及下部或以醋半盞灌鼻中亦得中熱死方汗頭巾湯浸洗汁服又有二方見中暑門冬月凍倒人急與冷水壹兩口扶在温暖處不得與熱湯熱物亦不得近火如已殭用草薦捲定外用䌇叄道繫扎定兩人兩頭徃來滚叄五百滚如捍氊狀自活且與温米飲喫漸近㣲火候半日已上方可漸食熱物近猛火如便與熱物及向火必死雪泥中行便近火即脚指随落凍死人已救活宜與此藥壹兩服生薑壹兩和皮剉碎陳橘皮不去白壹兩剉碎右共用水叄盞煎至壹盞半放温與服不可冷不可熱凡卒死或先疾病及寢卧間忽然而絶皆是中惡救之方用葱黃心於男左女右鼻中㓨入深陸㭍寸令目中血出即活又綿浸好酒半盞手按令汁入鼻中并捉手足勿令驚又視上唇裏絃有如黍米粒以針挑破又皂角或生半夏末如大豆許吹兩鼻中客忤者中惡之類多於道路在外得之令人心腹絞痛脹滿氣衝心胷不即治殺人好墨為末水調貳錢服又銅或瓦器盛湯著肚上轉移温之稍冷即不用衣襯湯冷别換又鹽貳錢水叄盞煎壹盞分貳服得吐即愈中惡客忤卒死鬼擊亦相類為治可通用之搗生菖蒲根取汁壹盞灌之鬼擊之狀卒著如刀刺胷脇腹内絞急切痛不可按摩或吐血下血衂血熟艾如拳大水伍盞煑叄盞頓服又好酒壹盞灌鼻中又鹽壹盞和攪令服并以冷水潠之吐即差又蓬莪术酒研服一盞凡魘死不得著燈火照亦不得近前急喚多殺人但痛咬其足跟及足拇指甲邊并多唾其面即活又皂角末如大豆許吹兩鼻中得􅅉則氣通叄肆日者猶可救又蘆管吹兩耳并取病人髪貳㭍莖撚作繩刺鼻中又灸足大指聚毛中叄㭍壯又鹽湯灌之夏月不可淘井多致殺人宜先以雞毛放井中試之如摇動不肯便下是有毒氣不可入古冢亦然五月七月尤甚如已中毒以水潠其面并含水調雄黃末壹貳錢服轉筋入腹痛欲死者使四人捉手足灸臍左邊貳寸拾肆壯又生薑壹兩擘碎酒伍盞煑濃頓服又醋煑衣絮令徹温裹轉筋處又濃煑鹽湯通手浸手足洗胷脇間解中毒及能治挑生毒夏鹽場舜臣傳壹日之毒中人即席狂亂五内如刀攪割不逾時而死此壹種最急然亦易治但以人頭垢用水調或洗頭巾水灌之吐出即解貳日之毒中人半日乃發其候精神昬惑腸胃攪刺霍亂吐㵼經夕而卒以逺人處茒根下淨黃土攪冷水灌之乃解叄日之後毒中人似稍緩今兇人多用之被中者頗難知其初覺惡心減食暨毒發大槩類傷寒候肢節疼倦或作寒熱多唾皮膚習習痺覺如針鋩刺人又如被蜂蠆螫痛至甚着床啞而死此毒中人亦不過兩日後發只取田中蟛蜞叄貳拾枚淨洗作鱠食之臨卧復碎蟛蜞拾數枚冷水投之天明㵼解諸湯近侍湯丁香壹兩桂去麄皮半兩甘草剉壹兩半縮砂仁肆兩鹽叄兩麝香壹錢研後入右先將鹽炒令乾次入縮砂甘草熳火炒黃色承熱用淨器先入壹半在底次下丁香在中又以壹半葢之宻封口候冷入桂急碾為細末却入麝香同拌勻磁合盛窨叄伍日每服壹錢沸湯㸃之八神湯神麯叄兩搗碎略炒大麥蘖叄兩搗碎畧炒甘草叄兩炙草菓子肆箇煨去皮橘紅壹兩丁香叄錢不焙胡椒叄錢粟米壹兩炒熟右為細末入鹽㸃服洞庭湯陳皮肆兩檀香半兩甘草壹兩右為細末入鹽㸃服清中湯大菖蒲刮去皮秤壹斤切片子入鹽肆兩和勻入薑人參壹兩去蘆生薑不去皮細切已上同淹夏壹宿冬叄宿取出日乾黃其色得桔梗肆兩去蘆甘草貳兩微炙右為末不入鹽㸃去暑毒疫氣菖蒲非石上者乃是水中河邊採取快氣湯生薑壹斤切作片子以鹽貳兩淹兩宿焙乾神麯叄兩白术貳兩橘皮貳兩不去白淨洗京三稜半兩炮蓬莪茂半兩甘草貳兩半炒大麥蘖貳兩炒草豆䓻壹箇煨去皮不得用多右為細末毎服壹錢入鹽湯㸃服又方香附子壹兩木香半兩甘草半兩炒縮紗半兩右為細末每服壹錢入鹽湯㸃服半夏湯吕彦能傳半夏先以水煑透軟焙乾為末薑汁和作餅子焙乾甘草炙杏仁去皮尖茯苓去皮右等分為末入鹽㸃服爽氣湯白术壹兩縮砂仁肆兩炒龍腦薄荷去土秤壹錢甘草壹兩半炙右為細末入鹽㸃服棖湯棖麴肆兩甘草壹兩檀香壹分白鹽壹兩右一處為末㸃服入龍腦少許尤竒棖麴法右用大香棖拾箇蒸餅拾箇先將蒸餅焙乾為細末次將棖子去穰爛研如泥入蒸餅末搗勻以圈子打成麴餅子慢火焙乾又方能温中調氣大香棖拾箇甘草肆兩别為末白檀香半兩乾淨白鹽肆兩生薑叄兩切作片别置壹處白梅肉半兩别切作薄片右將棖子切開去子切作薄片入甘草末生薑片子叄物壹處和勻用微火焙令半乾次入白梅肉片子再和勻添火焙令極乾方入檀香壹處為末入鹽和勻瓷器収勿令見風凡入藥味次苐須依本法上焙須寛緩着意勿令傷火木𤓰湯木𤓰生去皮穰薄切片子秤叄斤生薑洗淨薄切片子秤壹斤半甘草生用細剉碎秤壹斤鹽篩㨂令淨秤壹斤貳兩右同入盆内拌勻罨壹宿後於日中㬠不住攪轉候水脈盡慢火焙乾急碾為細末入垍器貯之毎服貳錢白湯㸃服六犯豆蔲湯生薑壹斤切片㬠乾草果半斤去殻并白皮甘草肆兩炒只如此名豆䓻湯入鹽㸃用鹽貳兩不㬠生薑淹壹夕成末三倍湯添縮砂與甘草同四神湯添胡椒半兩名五順湯添蓽撥半兩成六和湯添半夏貳兩名七氣湯右為末入鹽如常服御府五辛寛隔湯方見氣疾門夏子益治竒疾方叄拾捌道唐與義刋印于上饒其間一二證昔嘗見有病之者皆莫知所以治療之法今得子益之方敢以附此書之末用廣其𫝊第一項上生瘡如櫻桃大有五色瘡破即項皮斷上連髪卷去下去足脫之乃為肉人疾初見此瘡治但逐日飲牛乳自消第二人發寒熱不止經數日後四肢堅如石以物擊之似鍾磬日漸瘦惡治以茱茰木香等煎湯飲五日可解愈第三大腸頭出寸餘痛苦直候乾自退落又出名為截腸病若腸盡乃不治矣但初覺截餘寸治用油壹盞以臀坐之飲大麻子汁數升愈第四口鼻中腥臭水流以椀盛之有鐵色鰕魚如粳米大走躍不住以手捉之即化為水此肉壊矣治用任饌食雞月餘可補完矣第五兩足心凸如腫上面生黑色豆瘡硬似丁子釘了履地不得脛骨生碎眼髓流出身發寒顫唯思飲酒此是肝腎氣冷熱相吞治用炮川烏頭末付之煎韭子湯服壹盞愈第六凡腹脹經乆忽泄㵼數升晝夜不止服藥不驗廼為氣脫治用益智子煎濃湯服之立愈第七四肢節脫但有皮連不能舉動名曰筋鮮治以酒浸黃蘆叄兩取出焙乾為末毎服貳錢酒調下服盡則安第八玉柯硬不痿精流無歇時時如針狀捏之則脆碎乃為腎滿漏疾治用韮子破故紙各壹兩末服叄錢水壹盞煎至陸分喫毎日叄次飲之愈即住服第九咽喉間生肉層層相疊五色漸漸腫起不痛多日乃有竅子臭氣自出遂退飲食治用橘葉煎湯喫伍盞愈第十腹脹如鐵石臍中水出旋變作步缺蟲之狀繞身匝啄痒痛難忍撥掃不盡治用濃煎蒼术湯浴之别用麝香以水調服痊第十一眼前常見諸般禽䖝飛走以手捉之則無有乃肝膽經為疾治用酸􅀥仁𦍑活元明粉青桐子花各壹兩為末毎服貳錢水壹大盞􅋩至㭍分和滓飲逐日叄服第十二大腸蟲出百十尺不斷斷之復生行坐不得治服鶴虱末水調伍錢服之自愈第十三眼睛垂出至鼻如黒角色痛不可忍或時時大便血出名曰肝脹治用煎𦍑活汁服數盞自愈第十四腹中有物作聲隨人語言治用板藍汁壹盞分伍服壹日又見小說名曰應聲蟲當服雷丸䖝自愈第十五有飲油伍升以來方始快意長得喫則安不爾則病此是髪入胃被氣血裹了化為蟲也治用雄黃半兩為末水調服蟲自出如蟲出活者置於油中逡巡間自耗第十六卧於牀四肢不能動只進得飲食好大言説喫物謂之失說物妄漑病治如說食猪肉時便云你喫猪肉壹頓病者聞之即喜遂置肉令病人見臨安却不與喫此乃失他物朢也當自睡口中涎出便愈第十七手十指節斷壊唯有筋連無節肉蟲出如燈心麄長數尺遍身綠毛眷多名曰血餘治以茯苓胡黃連煎湯飲兩盞愈第十八遍身忽皮底混混如波浪聲痒不可忍抓之肉血出亦不能解謂之氣奔治以人參苦杖青鹽白术細辛各壹兩為末作壹服水貳椀煎拾數沸去滓飲盡便愈第十九白人渾黑見物依舊毛髪直如鐵條雖能飲食不語如大醉名曰血潰治之用五靈脂貳錢為末酒調下第二十因著灸訖火痂便退落瘡内鮮肉片子飛如蝶狀騰空去了手捉壊痛不可忍是血肉俱熱治用大黃朴硝各半兩為末水調下微利即愈第二十一毎至臨卧渾身虱出約至伍升隨手血肉俱壊毎宿漸多痒痛不可名狀唯喫水卧在牀上晝夜號哭舌尖出血不止身齒俱黒唇動鼻開治之但飲鹽醋湯拾數盞即愈第二十二眼赤鼻張大喘渾身生班毛髪起如銅鐵蓋目中熱毒氣結於下焦治用白礬滑石各壹兩為末都作壹服水叄椀煎去半冷不住飲候盡乃安第二十三有䖝如蟹走於皮下作聲如小兒啼為筋肉之化治用雷丸雄黃各壹兩為末摻在猪肉壹片上炙熟喫盡自安第二十四手足甲忽然長倒生刺肉如錐痛不可忍治只便喫葵菜自愈第二十五鼻中毛出晝夜可長五尺漸漸麄圓如繩痛不可忍雖忍痛摘去莖即復更生此由食猪羊血過多生治用乳石􅓀砂各壹兩為末以飯圎如桐子大空心臨卧各壹服水下拾粒自然退落第二十六面上及遍身生瘡似猫兒眼有光彩無膿血但痛痒不常飲食減少久則透腔名曰寒光疾治多喫魚鷄葱韮自愈第二十七脅破腸出息穢多急以油摸腸却送入煎人參枸杞湯淋之皮自合矣喫羊腎粥十日愈第二十八口鼻中氣出盤旋不散凝如黑葢色過十日則漸漸至肩胷與肉相連堅勝金石鐵無由飲食此多因瘧後得也治煎澤㵼湯日飲叄盞連服伍日愈第二十九婦人月信出皆為禽獸之狀以傷人治先將綿塞隂戸只頓服没藥壹兩餘作圎散可服即時止第三十遍身忽然肉出如錐旣痒且痛不能飲食此名血住若不速治必潰而膿出治以赤皮葱燒灰淋洗喫豉湯叄盞自安矣第三十一眉毛摇動自不能視交睫喚之不應但能飲食有經日不較者治用蒜叄兩取汁酒調下立愈第三十二毛竅非一次齊血出不出皮脹膨膨如鼓須臾眼鼻口被氣脹合此名􅪊溢治飲生薑水貳盞自安第三十三忽氣上喘不能語口中汁似脂如流吐逆齒皆摇動氣出轉大則悶絶蘇復如是名曰傷寒併熱霍亂治用大黃人參末各半兩水叄盞煎至壹盞熱去滓壹服盡第三十四口内生肉毬臭惡自己惡見有根線長五寸餘釵股吐毬出以飲食了却吞其線以手輕揑痛徹於心力困不可言治用喫水調麝香壹錢叄宿驗第三十五渾身生燎胞如甘棠梨毎箇破出水内有石一片如指甲面大胞復生抽盡肌膚肉則不可治急用荆三稜蓬莪术各伍兩分叄服酒調下第三十六頭面發熱有光色他人手近之如火燒人治用蒜汁半兩酒調下吐出蛇狀遂安第三十七人自覺自形作兩人並卧不别真假不語問亦無對乃是離䰟治用辰砂人參茯苓濃煎湯服之真者氣爽假者化矣第三十八牙齒逐日長漸漸脹開口難為飲食蓋髄溢所致只服白术愈𫝊信適用方卷下
